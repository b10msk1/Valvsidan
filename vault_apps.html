        const updateStatus = (text) => document.getElementById('loading-text').innerText = text;

        const init = () => {
            updateStatus("Initierar Serverrum...");
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.background = new THREE.Color('#050a14');
            scene.fog = new THREE.FogExp2('#050a14', 0.02); 

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3, 7); camera.lookAt(0, 1, 0);
            clock = new THREE.Clock();

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.2; 
            container.appendChild(renderer.domElement);

            const renderScene = new THREE.RenderPass(scene, camera);
            const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85); 
            composer = new THREE.EffectComposer(renderer);
            composer.addPass(renderScene); composer.addPass(bloomPass);

            scene.add(new THREE.AmbientLight(0xffffff, 0.3)); 
            hemiLight = new THREE.HemisphereLight(0x1e293b, 0x050a14, 2.0); scene.add(hemiLight);

            mainDirLight = new THREE.DirectionalLight(0x00e5ff, 2.0); 
            mainDirLight.position.set(5, 10, 5); mainDirLight.castShadow = true; 
            scene.add(mainDirLight);

            mainGltfLoader = new THREE.GLTFLoader();
            const dracoLoader = new THREE.DRACOLoader();
            dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.4.1/');
            mainGltfLoader.setDRACOLoader(dracoLoader);

            const pingGeo = new THREE.RingGeometry(0.5, 0.6, 32);
            pingMarker = new THREE.Mesh(pingGeo, new THREE.MeshBasicMaterial({ color: 0x00e5ff, transparent: true, opacity: 0, side: THREE.DoubleSide }));
            pingMarker.rotation.x = -Math.PI / 2; pingMarker.position.y = 0.05; scene.add(pingMarker);

            // Bygg Cyber-rummet dynamiskt med din JSON data
            buildCyberNexus();

            playerGroup = new THREE.Group(); scene.add(playerGroup);
            const personalLight = new THREE.PointLight(0xffffff, 1.0, 15);
            personalLight.position.set(0, 2.5, 0); playerGroup.add(personalLight);

            // Ladda in bas-karaktären för att gå omkring
            const MODEL_URL = 'https://raw.githubusercontent.com/b10msk1/3dhall/main/character_base.glb';
            const IDLE_ANIM_URL = 'https://raw.githubusercontent.com/b10msk1/3dhall/main/idle.glb';
            const WALK_ANIM_URL = 'https://raw.githubusercontent.com/b10msk1/3dhall/main/walk.glb';

            const loadCharacterSystem = async () => {
                const loadGLTF = (url) => new Promise((resolve, reject) => mainGltfLoader.load(url, resolve, undefined, reject));
                try {
                    const gltfModel = await loadGLTF(MODEL_URL);
                    characterModel = gltfModel.scene;
                    characterModel.scale.set(0.01, 0.01, 0.01); characterModel.rotation.x = Math.PI / 2; 
                    playerGroup.add(characterModel);
                    characterModel.traverse((node) => { if (node.isMesh) node.castShadow = true; });

                    mixer = new THREE.AnimationMixer(characterModel);
                    try {
                        const gltfIdle = await loadGLTF(IDLE_ANIM_URL);
                        if (gltfIdle.animations.length > 0) animations['idle'] = mixer.clipAction(gltfIdle.animations[0]);
                        const gltfWalk = await loadGLTF(WALK_ANIM_URL);
                        if (gltfWalk.animations.length > 0) animations['walk'] = mixer.clipAction(gltfWalk.animations[0]);
                    } catch (e) { console.warn("Saknar animationsfiler.", e); }

                    if (animations['idle']) playAnimation('idle');
                    document.getElementById('loader').classList.add('fade-out');
                    setTimeout(() => showGuideText("App Valvet. Alla system online."), 1000);
                } catch (error) {
                    characterModel = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({ color: 0x0f172a, wireframe: true, emissive: 0x00e5ff, emissiveIntensity: 0.2 }));
                    characterModel.position.y = 1; characterModel.castShadow = true; playerGroup.add(characterModel);
                    document.getElementById('loader').classList.add('fade-out');
                }
            };
            loadCharacterSystem();

            window.addEventListener('keydown', onKeyDown, false);
            window.addEventListener('keyup', onKeyUp, false);
            window.addEventListener('resize', onWindowResize, false);
            
            const containerEL = document.getElementById('canvas-container');
            containerEL.addEventListener('mousemove', onMouseMove, false);
            containerEL.addEventListener('mousedown', onMouseDown, false); 
            containerEL.addEventListener('mouseup', () => isDragging = false, false);
            containerEL.addEventListener('dblclick', onDoubleClick, false);

            document.getElementById('close-panel').addEventListener('click', closeInfoPanel);
            document.getElementById('close-lightbox').addEventListener('click', closeLightbox);

            animate();
        };

        const buildCyberNexus = () => {
            const appData = loadAppDatabase();
            const totalApps = appData.length;
            
            // Beräkna korridorens längd utifrån antalet appar
            const corridorLength = Math.max(40, (Math.ceil(totalApps / 2) * 6) + 20); 
            
            // Det lysande golvet (Tron-Grid)
            const gridHelper = new THREE.GridHelper(40, corridorLength / 2, 0x00e5ff, 0x00e5ff);
            gridHelper.position.set(0, 0.01, -corridorLength / 2 + 10);
            gridHelper.material.opacity = 0.15;
            gridHelper.material.transparent = true;
            scene.add(gridHelper);

            // Det fysiska golvet under
            const floorGeo = new THREE.PlaneGeometry(40, corridorLength);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x02050a, roughness: 0.2, metalness: 0.8 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.set(0, 0, -corridorLength / 2 + 10);
            floor.receiveShadow = true;
            scene.add(floor); floors.push(floor);

            // Väggarna
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x0a1224, roughness: 0.7, metalness: 0.5 });
            const createWall = (x, rotY) => {
                const wall = new THREE.Mesh(new THREE.PlaneGeometry(corridorLength, 12), wallMat);
                wall.position.set(x, 6, -corridorLength / 2 + 10);
                wall.rotation.y = rotY;
                scene.add(wall);
            };
            createWall(-15, Math.PI / 2); // Vänster
            createWall(15, -Math.PI / 2); // Höger
            
            // Bakvägg
            const backWall = new THREE.Mesh(new THREE.PlaneGeometry(30, 12), wallMat);
            backWall.position.set(0, 6, -corridorLength + 10);
            scene.add(backWall);

            // Entré-vägg (bakom spelaren)
            const frontWall = new THREE.Mesh(new THREE.PlaneGeometry(30, 12), wallMat);
            frontWall.position.set(0, 6, 10);
            frontWall.rotation.y = Math.PI;
            scene.add(frontWall);

            // Placera ut apparna
            let currentZ = -10; // Starta en bit framför spelaren
            
            appData.forEach((app, index) => {
                const isLeft = index % 2 === 0;
                const xPos = isLeft ? -14.9 : 14.9;
                const rotY = isLeft ? Math.PI / 2 : -Math.PI / 2;
                
                if (index > 0 && index % 2 === 0) {
                    currentZ -= 6; 
                }

                createHologramScreen(xPos, 3, currentZ, rotY, app);
            });
        };

        const createHologramScreen = (x, y, z, rotY, info) => {
            const baseW = 4, baseH = 2.5;
            
            const canvasMesh = new THREE.Mesh(
                new THREE.PlaneGeometry(baseW, baseH), 
                new THREE.MeshStandardMaterial({ color: 0x000000 })
            );
            canvasMesh.position.set(x, y, z); 
            canvasMesh.rotation.y = rotY;
            
            const frameGeo = new THREE.EdgesGeometry(new THREE.PlaneGeometry(baseW + 0.1, baseH + 0.1));
            const frameMat = new THREE.LineBasicMaterial({ color: 0x00e5ff, transparent: true, opacity: 0.5 });
            const frame = new THREE.LineSegments(frameGeo, frameMat);
            frame.position.set(x, y, z);
            frame.rotation.y = rotY;
            scene.add(frame);

            // Ladda app-bild (Använd fallback-bild från designen om appen saknar egen bild)
            const finalImage = info.image || 'https://i.imgur.com/KHL8nfs.jpeg';
            
            const texLoader = new THREE.TextureLoader(); texLoader.setCrossOrigin('anonymous'); 
            texLoader.load(finalImage, (tex) => { 
                tex.encoding = THREE.sRGBEncoding; 
                canvasMesh.material = new THREE.MeshStandardMaterial({ 
                    map: tex, 
                    roughness: 0.2, 
                    metalness: 0.8,
                    emissive: 0xffffff,
                    emissiveMap: tex,
                    emissiveIntensity: 0.2 
                });
            });
            
            canvasMesh.userData = { isArtwork: true, highlightMesh: frame, info: info }; 
            artworks.push(canvasMesh); 
            scene.add(canvasMesh);
        };

        // --- INTERAKTION OCH UI ---
        const populateInfoPanel = (info) => {
            document.getElementById('info-title').innerText = info.title || "System App";
            document.getElementById('info-desc').innerText = info.desc || "Ingen data hittad.";
            document.getElementById('info-id').innerText = info.id || "SYS-000";
            
            // Fyll i Kategorierna om de finns
            if (info.mainCategory) {
                document.getElementById('info-main-category').innerText = info.mainCategory;
                document.getElementById('info-sub-category').innerText = info.subCategory || "";
            } else {
                document.getElementById('info-main-category').innerText = "Oklassificerad";
                document.getElementById('info-sub-category').innerText = "";
            }
            
            const thumb = document.getElementById('info-thumbnail');
            const finalImage = info.image || 'https://i.imgur.com/KHL8nfs.jpeg';
            thumb.src = finalImage;
            thumb.onclick = () => { openLightbox(finalImage); };

            const actionBtn = document.getElementById('action-btn');
            if (info.url) {
                actionBtn.classList.remove('hidden');
                actionBtn.onclick = () => {
                    showGuideText("Kopplar upp mot extern server...");
                    setTimeout(() => window.open(info.url, '_blank'), 1000); 
                };
            } else {
                actionBtn.classList.add('hidden');
            }
        };

        const closeInfoPanel = () => {
            isFocused = false; focusedArtwork = null; 
            document.getElementById('info-panel').classList.remove('panel-open'); 
            document.getElementById('info-panel').classList.add('panel-closed');
            showGuideText("Återgår till navigation."); 
        };

        const openLightbox = (url) => {
            document.getElementById('lightbox-img').style.transform = `translate(0px, 0px) scale(1)`;
            document.getElementById('lightbox-img').src = url;
            const lb = document.getElementById('lightbox'); lb.classList.remove('hidden'); setTimeout(() => lb.classList.remove('opacity-0'), 10);
        };

        const closeLightbox = () => {
            const lb = document.getElementById('lightbox'); lb.classList.add('opacity-0'); 
            setTimeout(() => lb.classList.add('hidden'), 300);
        };

        const showGuideText = (text) => {
            const dialog = document.getElementById('guide-dialog'); document.getElementById('guide-text').innerText = text; dialog.classList.remove('opacity-0');
            clearTimeout(window.guideTimeout); window.guideTimeout = setTimeout(() => { dialog.classList.add('opacity-0'); }, 5000);
        };

        const playAnimation = (name) => {
            const action = animations[name]; if (!action || currentAction === action) return;
            if (currentAction) currentAction.fadeOut(0.3);
            action.reset().fadeIn(0.3).play(); currentAction = action;
        };

        const onWindowResize = () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight); };

        const onMouseMove = (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1; mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            if (isDragging && !isFocused) { 
                const deltaX = event.clientX - previousMousePosition.x; const deltaY = event.clientY - previousMousePosition.y;
                cameraAngleX -= deltaX * 0.005; cameraAngleY -= deltaY * 0.005; cameraAngleY = Math.max(0.1, Math.min(Math.PI / 2.2, cameraAngleY)); 
            }
            previousMousePosition = { x: event.clientX, y: event.clientY };
        };

        const onMouseDown = () => {
            isDragging = true;
            if (hoveredArtwork && hoveredArtwork.userData.info && !isFocused) {
                isFocused = true; 
                focusedArtwork = hoveredArtwork; 
                const info = hoveredArtwork.userData.info;
                
                showGuideText(`Ansluter till: ${info.title}`);
                autoMoveTarget = null; 
                if (pingMarker) pingMarker.material.opacity = 0; 

                populateInfoPanel(info);
                document.getElementById('info-panel').classList.remove('panel-closed');
                document.getElementById('info-panel').classList.add('panel-open');

                // Kamerarörelse
                const objPos = hoveredArtwork.position; 
                const focusDist = isFirstPerson ? 2.5 : 4.5; 
                const rotY = hoveredArtwork.rotation.y; 
                
                let lookAtPos = objPos.clone();
                let camPos = new THREE.Vector3(objPos.x + Math.sin(rotY) * focusDist, objPos.y, objPos.z + Math.cos(rotY) * focusDist);
                
                let viewDir = new THREE.Vector3().subVectors(lookAtPos, camPos).normalize();
                let rightVec = viewDir.cross(new THREE.Vector3(0, 1, 0)).normalize();
                let shiftAmount = 1.8; 
                camPos.add(rightVec.clone().multiplyScalar(shiftAmount));
                lookAtPos.add(rightVec.clone().multiplyScalar(shiftAmount));

                focusCameraTarget.copy(camPos); 
                focusLookAtTarget.copy(lookAtPos);
            }
        };

        const onDoubleClick = (event) => {
            let clientX, clientY;
            if (event.touches) { clientX = event.touches[0].clientX; clientY = event.touches[0].clientY; } 
            else { clientX = event.clientX; clientY = event.clientY; }

            const tapMouse = new THREE.Vector2((clientX / window.innerWidth) * 2 - 1, -(clientY / window.innerHeight) * 2 + 1);
            raycaster.setFromCamera(tapMouse, camera);
            
            const floorIntersects = raycaster.intersectObjects(floors);
            if (floorIntersects.length > 0 && !isFocused) {
                autoMoveTarget = floorIntersects[0].point;
                if (pingMarker) {
                    pingMarker.position.set(autoMoveTarget.x, 0.05, autoMoveTarget.z);
                    pingMarker.material.opacity = 1.0;
                    pingMarker.scale.set(0.1, 0.1, 0.1);
                }
            }
        };

        const onKeyDown = (event) => { 
            const key = event.key.toLowerCase(); if (keys.hasOwnProperty(key)) keys[key] = true; 
            if (key === 'v') { 
                isFirstPerson = !isFirstPerson; 
                if (characterModel) characterModel.visible = !isFirstPerson; 
            }
        };
        const onKeyUp = (event) => { if (keys.hasOwnProperty(event.key.toLowerCase())) keys[event.key.toLowerCase()] = false; };

        const animate = () => {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (pingMarker && pingMarker.material.opacity > 0) {
                pingMarker.scale.addScalar(delta * 2); pingMarker.material.opacity -= delta * 1.5;
            }

            if (playerGroup) {
                let moveX = 0, moveZ = 0;
                let manualOverride = (keys.w || keys.a || keys.s || keys.d) && !isFocused;

                if (manualOverride) autoMoveTarget = null;

                if (autoMoveTarget && !isFocused) {
                    const dx = autoMoveTarget.x - playerGroup.position.x;
                    const dz = autoMoveTarget.z - playerGroup.position.z;
                    const dist = Math.sqrt(dx*dx + dz*dz);
                    
                    if (dist < 0.5) {
                        autoMoveTarget = null; 
                    } else {
                        playerGroup.position.x += (dx/dist) * moveSpeed * delta;
                        playerGroup.position.z += (dz/dist) * moveSpeed * delta;
                        
                        const targetAngle = Math.atan2(dx/dist, dz/dist);
                        let diff = targetAngle - playerGroup.rotation.y;
                        while (diff < -Math.PI) diff += Math.PI * 2;
                        while (diff > Math.PI) diff -= Math.PI * 2;
                        playerGroup.rotation.y += diff * 12 * delta; 
                        playAnimation('walk');
                    }
                } 
                else if (manualOverride) {
                    if (keys.w) moveZ -= 1; if (keys.s) moveZ += 1; if (keys.a) moveX -= 1; if (keys.d) moveX += 1;
                    const length = Math.sqrt(moveX * moveX + moveZ * moveZ);
                    const dirX = moveX / length, dirZ = moveZ / length;
                    const s = Math.sin(cameraAngleX), c = Math.cos(cameraAngleX);
                    const worldDirX = dirX * c - dirZ * s, worldDirZ = dirX * s + dirZ * c;

                    playerGroup.position.x += worldDirX * moveSpeed * delta;
                    playerGroup.position.z += worldDirZ * moveSpeed * delta;

                    const targetAngle = Math.atan2(worldDirX, worldDirZ);
                    let diff = targetAngle - playerGroup.rotation.y;
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    playerGroup.rotation.y += diff * 12 * delta; 
                    playAnimation('walk'); 
                    if (isFocused) closeInfoPanel();
                } else {
                    playAnimation('idle'); 
                }

                // Begränsa spelaren i korridoren dynamiskt
                let clampX = playerGroup.position.x;
                let clampZ = playerGroup.position.z;
                
                const corridorLength = Math.max(40, (Math.ceil(artworks.length / 2) * 6) + 20);
                
                if (clampX < -12) clampX = -12; 
                if (clampX > 12) clampX = 12; 
                if (clampZ > 5) clampZ = 5; 
                if (clampZ < -corridorLength + 15) clampZ = -corridorLength + 15; 
                
                playerGroup.position.x = clampX; playerGroup.position.z = clampZ;

                let targetCameraPos = new THREE.Vector3(); let targetLookAt = new THREE.Vector3();
                if (isFocused) { targetCameraPos.copy(focusCameraTarget); targetLookAt.copy(focusLookAtTarget); } 
                else if (isFirstPerson) {
                    targetCameraPos.copy(playerGroup.position).add(new THREE.Vector3(0, 2.5, 0)); 
                    const lookDir = new THREE.Vector3(-Math.sin(cameraAngleY) * Math.sin(cameraAngleX), -Math.cos(cameraAngleY) + 0.5, -Math.sin(cameraAngleY) * Math.cos(cameraAngleX)).normalize();
                    targetLookAt.copy(targetCameraPos).add(lookDir);
                } else {
                    const offsetX = cameraDistance * Math.sin(cameraAngleY) * Math.sin(cameraAngleX);
                    const offsetY = cameraDistance * Math.cos(cameraAngleY);
                    const offsetZ = cameraDistance * Math.sin(cameraAngleY) * Math.cos(cameraAngleX);
                    targetCameraPos.copy(playerGroup.position).add(new THREE.Vector3(offsetX, offsetY, offsetZ));
                    targetLookAt.copy(playerGroup.position).add(new THREE.Vector3(0, 1.5, 0));
                }
                camera.position.lerp(targetCameraPos, 0.08);
                if (currentLookAt.length() === 0) currentLookAt.copy(targetLookAt); 
                currentLookAt.lerp(targetLookAt, 0.08); camera.lookAt(currentLookAt);
                
                const targetFOV = isFocused ? 45 : 75;
                if (Math.abs(camera.fov - targetFOV) > 0.1) { camera.fov += (targetFOV - camera.fov) * 0.1; camera.updateProjectionMatrix(); }
            }

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(artworks);
            const holoUI = document.getElementById('hologram-ui');

            if (intersects.length > 0) {
                document.body.style.cursor = 'crosshair';
                if (hoveredArtwork !== intersects[0].object) {
                    if (hoveredArtwork) hoveredArtwork.userData.highlightMesh.material.opacity = 0.5;
                    hoveredArtwork = intersects[0].object;
                    hoveredArtwork.userData.highlightMesh.material.opacity = 1.0; 
                }
                if (!isFocused && hoveredArtwork) {
                    const vector = hoveredArtwork.position.clone(); vector.y += 0.5; vector.project(camera);
                    holoUI.style.left = `${(vector.x * .5 + .5) * window.innerWidth}px`; holoUI.style.top = `${(vector.y * -.5 + .5) * window.innerHeight}px`;
                    holoUI.classList.remove('opacity-0'); document.getElementById('hologram-title').innerText = hoveredArtwork.userData.info.title || "Granska";
                } else holoUI.classList.add('opacity-0');
            } else {
                document.body.style.cursor = 'default'; holoUI.classList.add('opacity-0'); 
                if (hoveredArtwork) { 
                    hoveredArtwork.userData.highlightMesh.material.opacity = 0.5; 
                    hoveredArtwork = null; 
                }
            }

            if (mixer) mixer.update(delta);
            composer.render();
        };

        window.onload = init;
    </script>
</body>
</html>
