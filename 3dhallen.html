<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery.Ops | 3D Exhibition</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Tailwind Konfiguration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0a0f1a',
                        panel: '#0f172a',
                        card: '#161d2b',
                        accent: '#e58e26',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Three.js Kärna & Laddare -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>

    <!-- POST-PROCESSING -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #0a0f1a; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .fade-out { opacity: 0; pointer-events: none; transition: opacity 0.5s ease-in-out; }
        .panel-open { transform: translateX(0); }
        .panel-closed { transform: translateX(100%); }
    </style>
</head>
<body class="text-slate-100 font-sans selection:bg-accent/30">

    <!-- Laddningsskärm -->
    <div id="loader" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-dark transition-opacity duration-500">
        <i data-lucide="loader-2" class="w-8 h-8 text-accent animate-spin mb-4"></i>
        <p id="loading-text" class="text-accent text-[10px] font-black uppercase tracking-widest">Initierar 3D-motor...</p>
    </div>

    <!-- LIGHTBOX (För högupplösta bilder) -->
    <div id="lightbox" class="fixed inset-0 z-[60] bg-black/90 hidden flex-col items-center justify-center p-8 backdrop-blur-md opacity-0 transition-opacity duration-300">
        <button id="close-lightbox" class="absolute top-8 right-8 text-slate-400 hover:text-accent bg-panel p-3 rounded-2xl border border-[#1e293b] cursor-pointer transition-colors shadow-xl">
            <i data-lucide="x"></i>
        </button>
        <img id="lightbox-img" class="max-w-full max-h-[85vh] rounded-xl border border-accent shadow-[0_0_50px_rgba(229,142,38,0.15)] object-contain" src="" />
    </div>

    <!-- Taktisk Header -->
    <header class="absolute top-6 left-6 right-6 z-10 flex justify-between items-center bg-panel/80 backdrop-blur-md px-6 py-4 rounded-[2rem] border border-[#1e293b] shadow-2xl">
        <div class="flex items-center gap-3">
            <i data-lucide="box" class="w-5 h-5 text-accent"></i>
            <h1 class="text-slate-100 font-black uppercase italic tracking-tighter text-lg leading-none">
                Gallery<span class="text-accent">.Ops</span>
            </h1>
        </div>

        <nav class="flex gap-2 relative">
            <button class="flex items-center gap-2 px-4 py-2 bg-card rounded-2xl border border-[#1e293b] hover:border-accent transition-all group cursor-pointer">
                <i data-lucide="user" class="w-3 h-3 text-slate-400 group-hover:text-accent transition-colors"></i>
                <span class="text-[9px] font-black uppercase tracking-widest text-slate-400 group-hover:text-slate-100">Karaktär</span>
            </button>
            <button id="system-btn" class="flex items-center gap-2 px-4 py-2 bg-card rounded-2xl border border-[#1e293b] hover:border-accent transition-all group cursor-pointer">
                <i data-lucide="settings" class="w-3 h-3 text-slate-400 group-hover:text-accent transition-colors"></i>
                <span class="text-[9px] font-black uppercase tracking-widest text-slate-400 group-hover:text-slate-100">System</span>
            </button>

            <!-- SYSTEM ADMIN DROPDOWN -->
            <div id="admin-panel" class="absolute top-14 right-0 w-48 bg-panel/95 backdrop-blur-md border border-[#1e293b] p-4 rounded-2xl shadow-2xl hidden z-50">
                <h3 class="text-accent font-black uppercase tracking-widest text-[10px] mb-4">Databas Kontroll</h3>
                <label class="flex items-center gap-2 mb-4 cursor-pointer">
                    <input type="checkbox" id="edit-mode-toggle" class="accent-accent w-4 h-4">
                    <span class="text-slate-100 text-[10px] font-black uppercase tracking-widest">Edit Mode</span>
                </label>
                <button id="export-btn" class="w-full bg-dark hover:bg-accent hover:text-dark border border-[#1e293b] hover:border-accent text-slate-400 text-[9px] font-black uppercase tracking-widest py-2 px-4 rounded-xl mb-2 transition-all">
                    Exportera JSON
                </button>
                <label class="w-full bg-dark hover:bg-accent hover:text-dark border border-[#1e293b] hover:border-accent text-slate-400 text-[9px] font-black uppercase tracking-widest py-2 px-4 rounded-xl cursor-pointer text-center block transition-all">
                    Importera JSON
                    <input type="file" id="import-file" accept=".json" class="hidden">
                </label>
            </div>
        </nav>
    </header>

    <!-- Status panel -->
    <div class="absolute bottom-6 left-6 z-10 flex flex-col gap-2 pointer-events-none">
        <div class="bg-panel/80 backdrop-blur-md px-4 py-3 rounded-2xl border border-[#1e293b] flex items-center gap-3 shadow-xl">
            <i data-lucide="crosshair" class="w-4 h-4 text-accent"></i>
            <div class="flex flex-col">
                <span class="text-[8px] font-black uppercase tracking-widest text-slate-500">Status</span>
                <span id="system-status" class="text-[10px] font-black uppercase tracking-widest text-slate-100">System Online</span>
            </div>
        </div>
    </div>

    <!-- HOLOGRAFISK OVERLAY -->
    <div id="hologram-ui" class="absolute pointer-events-none opacity-0 transition-opacity duration-300 flex flex-col items-center justify-center -translate-x-1/2 -translate-y-1/2 z-30 drop-shadow-lg">
        <span class="text-accent font-black uppercase tracking-widest text-[9px] animate-pulse mb-1">[ KLICKA FÖR ATT INSPEKTERA ]</span>
        <div class="bg-panel/90 backdrop-blur-sm border border-[#1e293b] px-4 py-2 rounded-xl flex items-center gap-2">
            <div class="w-1.5 h-1.5 bg-accent rounded-full"></div>
            <span id="hologram-title" class="text-slate-100 font-bold tracking-tighter text-sm uppercase italic">Titel</span>
        </div>
    </div>

    <!-- Taktisk Informations-Panel (Inkl. Edit Mode inputs) -->
    <div id="info-panel" class="absolute right-0 top-0 bottom-0 w-80 sm:w-96 bg-panel/95 backdrop-blur-xl border-l border-[#1e293b] panel-closed transition-transform duration-500 ease-in-out z-40 p-8 flex flex-col shadow-2xl">
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-2">
                <i data-lucide="database" class="w-4 h-4 text-accent"></i>
                <h2 class="text-accent font-black uppercase tracking-widest text-[10px]">Objekt-data</h2>
            </div>
            <button id="close-panel" class="text-slate-500 hover:text-accent transition-colors bg-card p-2 rounded-xl border border-[#1e293b] hover:border-accent cursor-pointer">
                <i data-lucide="x" class="w-4 h-4"></i>
            </button>
        </div>
        
        <!-- Vanlig Visning -->
        <h3 id="info-title" class="text-2xl font-black uppercase italic tracking-tighter text-slate-100 mb-4">Laddar...</h3>
        <p id="info-desc" class="text-slate-400 text-sm leading-relaxed mb-6">...</p>
        
        <!-- Edit Mode Visning -->
        <input type="text" id="edit-title" class="hidden bg-dark text-slate-100 font-black uppercase italic tracking-tighter text-lg border border-[#1e293b] focus:border-accent focus:outline-none rounded-xl p-3 mb-4 w-full transition-colors" placeholder="Titel..." />
        <textarea id="edit-desc" class="hidden bg-dark text-slate-400 text-sm border border-[#1e293b] focus:border-accent focus:outline-none rounded-xl p-3 mb-6 w-full h-32 resize-none transition-colors" placeholder="Beskrivning..."></textarea>
        <button id="save-info" class="hidden w-full bg-accent hover:bg-orange-400 text-dark font-black uppercase tracking-widest py-3 rounded-xl transition-colors mb-4">
            Spara Ändringar
        </button>
        
        <div class="mt-auto p-4 bg-dark rounded-2xl border border-[#1e293b]">
            <span class="text-[8px] font-black uppercase tracking-widest text-slate-500 block mb-1">Klassificering</span>
            <span class="text-[10px] font-black uppercase tracking-widest text-accent flex items-center gap-2">
                <div class="w-1.5 h-1.5 bg-accent rounded-full animate-pulse"></div>
                Utställd / Validerad
            </span>
        </div>
    </div>

    <!-- VIRTUELL GUIDE -->
    <div id="guide-dialog" class="absolute bottom-24 left-1/2 -translate-x-1/2 z-20 flex items-center gap-4 bg-panel/80 backdrop-blur-md px-6 py-3 rounded-[2rem] border border-[#1e293b] shadow-2xl transition-opacity duration-500 opacity-0 pointer-events-none">
        <div class="w-2 h-2 bg-accent rounded-full animate-pulse"></div>
        <p id="guide-text" class="text-slate-100 font-black uppercase tracking-widest text-[10px] italic">Initierar guide-protokoll...</p>
    </div>

    <!-- 3D Canvas -->
    <div id="canvas-container"></div>

    <script>
        lucide.createIcons();

        // --- FILVÄGAR ---
        const MODEL_URL = 'https://raw.githubusercontent.com/b10msk1/3dhall/main/character_base.glb';
        const IDLE_ANIM_URL = 'https://raw.githubusercontent.com/b10msk1/3dhall/main/idle.glb';
        const WALK_ANIM_URL = 'https://raw.githubusercontent.com/b10msk1/3dhall/main/walk.glb';
        const ARTWORK_URL_1 = 'min_tavla.jpg'; 
        const HANDICRAFT_URL_1 = 'https://raw.githubusercontent.com/b10msk1/3dhall/main/bobba.glb'; 
        const HANDICRAFT_URL_2 = 'https://raw.githubusercontent.com/b10msk1/3dhall/main/bystmedkedja.glb';
        const HANDICRAFT_URL_3 = 'https://raw.githubusercontent.com/b10msk1/3dhall/main/vitbyst.glb';

        // 3D System Variabler
        let scene, camera, renderer, clock, composer;
        let mixer, characterModel;
        let playerGroup; 
        const animations = {}; 
        let currentAction = null;
        let mainGltfLoader;

        // Kamera & Interaktions-variabler
        const mouse = new THREE.Vector2();
        const raycaster = new THREE.Raycaster();
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let cameraAngleX = 0; 
        let cameraAngleY = Math.PI / 6; 
        const cameraDistance = 8;
        const artworks = []; 
        let hoveredArtwork = null;

        let isFocused = false;
        let isFirstPerson = false;
        let focusCameraTarget = new THREE.Vector3();
        let focusLookAtTarget = new THREE.Vector3();
        let currentLookAt = new THREE.Vector3(); 
        let focusedArtwork = null; 
        let guideBot; 

        const keys = { w: false, a: false, s: false, d: false };
        const moveSpeed = 4.0;

        const updateStatus = (text) => {
            document.getElementById('loading-text').innerText = text;
        };

        const init = () => {
            updateStatus("Kompilerar miljö...");
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.background = new THREE.Color('#0a0f1a');
            scene.fog = new THREE.FogExp2('#0a0f1a', 0.03);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3, 7);
            camera.lookAt(0, 1, 0);

            clock = new THREE.Clock();

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            container.appendChild(renderer.domElement);

            const renderScene = new THREE.RenderPass(scene, camera);
            const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.5, 0.8);
            composer = new THREE.EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4); 
            scene.add(ambientLight);

            const hemiLight = new THREE.HemisphereLight(0x0a0f1a, 0x0f172a, 2.5); 
            scene.add(hemiLight);

            const dirLight = new THREE.DirectionalLight(0xe58e26, 1.5); 
            dirLight.position.set(5, 10, 5);
            dirLight.castShadow = true; 
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);

            mainGltfLoader = new THREE.GLTFLoader();
            const dracoLoader = new THREE.DRACOLoader();
            dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.4.1/');
            mainGltfLoader.setDRACOLoader(dracoLoader);

            buildGalleryRoom();

            playerGroup = new THREE.Group();
            scene.add(playerGroup);

            const personalLight = new THREE.PointLight(0xffffff, 0.8, 15);
            personalLight.position.set(0, 2.5, 0);
            playerGroup.add(personalLight);

            const botGeo = new THREE.SphereGeometry(0.12, 16, 16);
            const botMat = new THREE.MeshStandardMaterial({ color: 0x161d2b, emissive: 0xe58e26, emissiveIntensity: 2.0 });
            guideBot = new THREE.Mesh(botGeo, botMat);
            guideBot.position.set(0, 3, 0);
            scene.add(guideBot);
            
            setTimeout(() => showGuideText("Välkommen till hallen. WASD för att navigera. 'V' för First-Person."), 3000);

            const loadCharacterSystem = async () => {
                const loadGLTF = (url) => new Promise((resolve, reject) => mainGltfLoader.load(url, resolve, undefined, reject));

                try {
                    updateStatus("Laddar huvudmodell...");
                    const gltfModel = await loadGLTF(MODEL_URL);
                    characterModel = gltfModel.scene;
                    
                    characterModel.scale.set(0.01, 0.01, 0.01); 
                    characterModel.rotation.x = Math.PI / 2; 
                    
                    playerGroup.add(characterModel);
                    
                    characterModel.traverse((node) => { if (node.isMesh) node.castShadow = true; });

                    mixer = new THREE.AnimationMixer(characterModel);

                    updateStatus("Injicerar animationer...");
                    try {
                        const gltfIdle = await loadGLTF(IDLE_ANIM_URL);
                        if (gltfIdle.animations.length > 0) animations['idle'] = mixer.clipAction(gltfIdle.animations[0]);
                        const gltfWalk = await loadGLTF(WALK_ANIM_URL);
                        if (gltfWalk.animations.length > 0) animations['walk'] = mixer.clipAction(gltfWalk.animations[0]);
                    } catch (e) { console.warn("Saknar animationsfiler."); }

                    if (animations['idle']) playAnimation('idle');

                    finishLoading("Karaktär & System Online");
                } catch (error) {
                    createFallbackCharacter();
                    finishLoading("Karaktär: Fallback");
                }
            };

            loadCharacterSystem();

            window.addEventListener('keydown', onKeyDown, false);
            window.addEventListener('keyup', onKeyUp, false);
            window.addEventListener('mousemove', onMouseMove, false);
            window.addEventListener('mousedown', onMouseDown, false); 
            window.addEventListener('mouseup', () => isDragging = false, false);
            window.addEventListener('resize', onWindowResize, false);
            
            document.getElementById('close-panel').addEventListener('click', closeInfoPanel);
            
            document.getElementById('close-lightbox').addEventListener('click', () => {
                const lb = document.getElementById('lightbox');
                lb.classList.add('opacity-0');
                setTimeout(() => lb.classList.add('hidden'), 300);
            });

            document.getElementById('system-btn').addEventListener('click', () => {
                document.getElementById('admin-panel').classList.toggle('hidden');
            });
            
            document.getElementById('save-info').addEventListener('click', () => {
                if (focusedArtwork) {
                    focusedArtwork.userData.info.title = document.getElementById('edit-title').value;
                    focusedArtwork.userData.info.desc = document.getElementById('edit-desc').value;
                    showGuideText("Uppdatering sparad i RAM-minnet.");
                }
            });

            document.getElementById('export-btn').addEventListener('click', () => {
                const exportData = artworks.map(a => a.userData.info);
                const blob = new Blob([JSON.stringify(exportData, null, 2)], {type: "application/json"});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; 
                a.download = "gallery_ops_data.json"; 
                a.click();
                showGuideText("Data exporterad till lokal enhet.");
            });

            document.getElementById('import-file').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        data.forEach(imp => {
                            const art = artworks.find(a => a.userData.info.id === imp.id);
                            if (art) {
                                art.userData.info.title = imp.title;
                                art.userData.info.desc = imp.desc;
                            }
                        });
                        showGuideText("System återställt från JSON.");
                    } catch (err) {
                        showGuideText("Fel vid import av databas.");
                    }
                };
                reader.readAsText(file);
                document.getElementById('admin-panel').classList.add('hidden'); 
            });

            animate();
        };

        const buildGalleryRoom = () => {
            const roomSize = 40;
            const wallHeight = 8;

            const createNoiseTexture = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 512;
                canvas.height = 512;
                const ctx = canvas.getContext('2d');
                const imgData = ctx.createImageData(512, 512);
                for (let i = 0; i < imgData.data.length; i += 4) {
                    const val = Math.random() * 255;
                    imgData.data[i] = val; imgData.data[i+1] = val; imgData.data[i+2] = val; imgData.data[i+3] = 255;
                }
                ctx.putImageData(imgData, 0, 0);
                const texture = new THREE.CanvasTexture(canvas);
                texture.wrapS = THREE.RepeatWrapping; texture.wrapT = THREE.RepeatWrapping;
                return texture;
            };

            const floorNoiseTex = createNoiseTexture();
            floorNoiseTex.repeat.set(25, 25); 

            const wallNoiseTex = createNoiseTexture();
            wallNoiseTex.repeat.set(10, 3); 

            const floorMat = new THREE.MeshStandardMaterial({ 
                color: 0x05080f, roughness: 0.6, metalness: 0.4, bumpMap: floorNoiseTex, bumpScale: 0.015 
            });
            
            const floorMain = new THREE.Mesh(new THREE.PlaneGeometry(roomSize, roomSize), floorMat);
            floorMain.rotation.x = -Math.PI / 2;
            floorMain.receiveShadow = true;
            scene.add(floorMain);

            const floorCorridor = new THREE.Mesh(new THREE.PlaneGeometry(10, 20), floorMat);
            floorCorridor.rotation.x = -Math.PI / 2;
            floorCorridor.position.set(0, 0, 30); 
            floorCorridor.receiveShadow = true;
            scene.add(floorCorridor);

            const floorHallB = new THREE.Mesh(new THREE.PlaneGeometry(60, 60), floorMat);
            floorHallB.rotation.x = -Math.PI / 2;
            floorHallB.position.set(0, 0, 70); 
            floorHallB.receiveShadow = true;
            scene.add(floorHallB);

            const wallMat = new THREE.MeshStandardMaterial({ 
                color: 0x0f172a, roughness: 0.9, bumpMap: wallNoiseTex, bumpScale: 0.02
            });
            
            const createWall = (width, x, z, rotY) => {
                const wall = new THREE.Mesh(new THREE.PlaneGeometry(width, wallHeight), wallMat);
                wall.position.set(x, wallHeight / 2, z);
                wall.rotation.y = rotY;
                wall.receiveShadow = true;
                scene.add(wall);
            };

            createWall(40, 0, -20, 0); 
            createWall(40, -20, 0, Math.PI / 2); 
            createWall(40, 20, 0, -Math.PI / 2); 
            createWall(15, -12.5, 20, Math.PI); 
            createWall(15, 12.5, 20, Math.PI);  
            
            createWall(20, -5, 30, Math.PI / 2); 
            createWall(20, 5, 30, -Math.PI / 2); 

            createWall(60, -30, 70, Math.PI / 2); 
            createWall(60, 30, 70, -Math.PI / 2); 
            createWall(60, 0, 100, Math.PI);      
            
            createWall(25, -17.5, 40, 0); 
            createWall(25, 17.5, 40, 0);  

            const addDownlight = (zPos) => {
                const light = new THREE.SpotLight(0xfff0dd, 2.0);
                light.position.set(0, 7, zPos);
                const target = new THREE.Object3D();
                target.position.set(0, 0, zPos);
                scene.add(target);
                light.target = target;
                light.angle = Math.PI / 4;
                light.penumbra = 0.5;
                scene.add(light);
            };
            addDownlight(25);
            addDownlight(35);

            const hallBLight = new THREE.PointLight(0x00e5ff, 1.5, 50);
            hallBLight.position.set(0, 8, 70);
            scene.add(hallBLight);

            addWallSign("HALL A: FYSISK KONST", 0, 6, -19.9, 0, '#e58e26'); 
            addWallSign("AURA CORRIDOR", 0, 6, 20.1, Math.PI, '#a855f7'); 
            addWallSign("HALL B: AI VISIONER", 0, 6, 40.1, 0, '#00e5ff');

            addArtworkPlaceholder(-12, 3, -19.9, 0, 'https://i.imgur.com/M31eTpz.png', { id: "art_1", title: "Original 01", desc: "Handgjort originalverk från Bloms kollektion." });
            addArtworkPlaceholder(0, 3, -19.9, 0, 'https://i.imgur.com/Wm8YjcI.png', { id: "art_2", title: "Original 02", desc: "Ett stämningsfullt hantverk." });
            addArtworkPlaceholder(12, 3, -19.9, 0, 'https://i.imgur.com/Di7y4yW.png', { id: "art_3", title: "Original 03", desc: "Detaljerad studie i form och textur." });

            addArtworkPlaceholder(-19.9, 3, -10, Math.PI / 2, 'https://i.imgur.com/oNP8qmG.png', { id: "art_4", title: "Original 04", desc: "Mörker och ljus i symbios." });
            addArtworkPlaceholder(-19.9, 3, 2, Math.PI / 2, 'https://i.imgur.com/dV7mcum.png', { id: "art_5", title: "Original 05", desc: "En djupare inblick i skapandet." });
            addArtworkPlaceholder(-19.9, 3, 14, Math.PI / 2, 'https://i.imgur.com/u44Drpo.png', { id: "art_6", title: "Original 06", desc: "Taktilt och expressivt." });

            addArtworkPlaceholder(19.9, 3, -10, -Math.PI / 2, 'https://i.imgur.com/iKBksWZ.png', { id: "art_7", title: "Original 07", desc: "Konceptuell utforskning." });

            const frame = new THREE.Mesh(new THREE.PlaneGeometry(baseW + framePadding, baseH + framePadding), frameMat);

        const addArtworkPlaceholder = (x, y, z, rotY, imageUrl, info, themeColor = 0xe58e26, lightColor = 0xfff0dd) => {
            const baseW = 4;
            const baseH = 3;
            const framePadding = 0.2;

            const frameMat = new THREE.MeshStandardMaterial({ color: 0x161d2b, emissive: themeColor, emissiveIntensity: 0.5, side: THREE.DoubleSide });
            const frame = new THREE.Mesh(new THREE.PlaneGeometry(baseW + framePadding, baseH + framePadding), frameMat);
            frame.position.set(x, y, z);
            frame.rotation.y = rotY;
            scene.add(frame);

            let canvasMat = new THREE.MeshStandardMaterial({ color: 0x0a0f1a });
            const canvasMesh = new THREE.Mesh(new THREE.PlaneGeometry(baseW, baseH), canvasMat);
            canvasMesh.position.set(x, y, z + 0.05);
            canvasMesh.rotation.y = rotY;
            
            if (imageUrl && imageUrl !== 'min_tavla.jpg') {
                const textureLoader = new THREE.TextureLoader();
                textureLoader.setCrossOrigin('anonymous'); 
                textureLoader.load(imageUrl, (tex) => { 
                    tex.encoding = THREE.sRGBEncoding; 
                    canvasMesh.material = new THREE.MeshStandardMaterial({ map: tex, roughness: 0.3, metalness: 0.1 });
                    
                    const aspect = tex.image.width / tex.image.height;
                    let targetWidth, targetHeight;

                    if (aspect > 1) { 
                        targetWidth = baseW;
                        targetHeight = baseW / aspect;
                    } else { 
                        targetHeight = baseH + 0.5; 
                        targetWidth = targetHeight * aspect;
                    }

                    canvasMesh.scale.set(targetWidth / baseW, targetHeight / baseH, 1);
                    frame.scale.set((targetWidth + framePadding) / (baseW + framePadding), (targetHeight + framePadding) / (baseH + framePadding), 1);
                });
            }
            
            info.imageUrl = imageUrl;
            canvasMesh.userData = { isArtwork: true, highlightMesh: frame, info: info };
            artworks.push(canvasMesh);
            scene.add(canvasMesh);

            const spotLight = new THREE.SpotLight(lightColor, 3.0);
            spotLight.position.set(x + Math.sin(rotY) * 5, y + 4, z + Math.cos(rotY) * 5);
            spotLight.target = canvasMesh;
            spotLight.angle = Math.PI / 7;
            spotLight.penumbra = 0.8;
            scene.add(spotLight);
        };

        const openInfoPanel = (info, is3D) => {
            const isEditMode = document.getElementById('edit-mode-toggle').checked;

            if (isEditMode) {
                document.getElementById('info-title').classList.add('hidden');
                document.getElementById('info-desc').classList.add('hidden');

                document.getElementById('save-info').classList.remove('hidden');

                document.getElementById('edit-title').value = info.title;
                document.getElementById('edit-desc').value = info.desc;
            } else {
                document.getElementById('info-title').classList.remove('hidden');
                document.getElementById('info-desc').classList.remove('hidden');
                document.getElementById('edit-title').classList.add('hidden');
                document.getElementById('edit-desc').classList.add('hidden');
                document.getElementById('save-info').classList.add('hidden');

                document.getElementById('info-title').innerText = info.title;
                document.getElementById('info-desc').innerText = info.desc;

                    lb.classList.remove('hidden');
                    setTimeout(() => lb.classList.remove('opacity-0'), 10);

            document.getElementById('info-panel').classList.remove('panel-closed');
            document.getElementById('info-panel').classList.add('panel-open');

        const closeInfoPanel = () => {
            isFocused = false; 
            focusedArtwork = null; 
            document.getElementById('info-panel').classList.remove('panel-open');
            document.getElementById('info-panel').classList.add('panel-closed');
            showGuideText("Fortsätter skanning..."); 
            
            const lb = document.getElementById('lightbox');
            lb.classList.add('opacity-0');
            setTimeout(() => lb.classList.add('hidden'), 300);
        };

        const showGuideText = (text) => {
            const dialog = document.getElementById('guide-dialog');
            document.getElementById('guide-text').innerText = text;
            dialog.classList.remove('opacity-0');
            
            clearTimeout(window.guideTimeout);
            window.guideTimeout = setTimeout(() => {
                dialog.classList.add('opacity-0');
            }, 5000);
        };

        const playAnimation = (name) => {
            const action = animations[name];
            if (!action || currentAction === action) return;
            if (currentAction) currentAction.fadeOut(0.3);
            action.reset().fadeIn(0.3).play();
            currentAction = action;
        };

        const createFallbackCharacter = () => {
            const mat = new THREE.MeshStandardMaterial({ color: 0x0f172a, wireframe: true, emissive: 0xe58e26, emissiveIntensity: 0.2 });
            characterModel = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), mat);
            characterModel.position.y = 1;
            characterModel.castShadow = true;
            playerGroup.add(characterModel);
        };

        const finishLoading = (statusText) => {
            document.getElementById('loader').classList.add('fade-out');
            document.getElementById('system-status').innerText = statusText;
        };

        const onWindowResize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight); 
        };

        const onMouseMove = (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            if (isDragging) { 
                const deltaX = event.clientX - previousMousePosition.x;
                const deltaY = event.clientY - previousMousePosition.y;
                
                if (isFocused && focusedArtwork && focusedArtwork.userData.is3D) {
                    focusedArtwork.userData.modelMesh.rotation.y += deltaX * 0.01;
                } else if (!isFocused) {
                    cameraAngleX -= deltaX * 0.005;
                    cameraAngleY -= deltaY * 0.005;
                    cameraAngleY = Math.max(0.1, Math.min(Math.PI / 2.2, cameraAngleY));
                }
            }
            previousMousePosition = { x: event.clientX, y: event.clientY };
        };

        const onMouseDown = () => {
            isDragging = true;
            
            if (hoveredArtwork && hoveredArtwork.userData.info && !isFocused) {
                isFocused = true;
                focusedArtwork = hoveredArtwork; 
                openInfoPanel(hoveredArtwork.userData.info, hoveredArtwork.userData.is3D);
                
                showGuideText(`Analyserar: ${hoveredArtwork.userData.info.title}`);

                const objPos = hoveredArtwork.position;
                const is3D = hoveredArtwork.userData.is3D;
                const focusDist = isFirstPerson ? 2.5 : 4.5; 

                if (is3D) {
                    let dirToChar = new THREE.Vector3().subVectors(playerGroup.position, objPos);
                    dirToChar.y = 0; 
                    dirToChar.normalize();
                    
                    focusCameraTarget.copy(objPos).add(dirToChar.multiplyScalar(focusDist));
                    focusCameraTarget.y = objPos.y + 1.5; 
                    
                    focusLookAtTarget.copy(objPos);
                    focusLookAtTarget.y += 0.5; 
                } else {
                    const rotY = hoveredArtwork.rotation.y;
                    focusCameraTarget.set(
                        objPos.x + Math.sin(rotY) * focusDist,
                        objPos.y, 
                        objPos.z + Math.cos(rotY) * focusDist
                    );
                    focusLookAtTarget.copy(objPos);
                }
            }
        };

        const onKeyDown = (event) => { 
            const key = event.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = true; 
            
            if (key === 'v') {
                isFirstPerson = !isFirstPerson;
                if (characterModel) characterModel.visible = !isFirstPerson;
                showGuideText(isFirstPerson ? "First-Person Mode: ONLINE" : "Third-Person Mode: ONLINE");
            }
        };
        const onKeyUp = (event) => { if (keys.hasOwnProperty(event.key.toLowerCase())) keys[event.key.toLowerCase()] = false; };

        // --- RENDER LOOP ---
        const animate = () => {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            artworks.forEach(item => {
                if (item.userData.modelMesh && item !== focusedArtwork) {
                    item.userData.modelMesh.rotation.y += delta * 0.5;
                }
            });

            if (playerGroup) {
                let moveX = 0, moveZ = 0;
                if (keys.w) moveZ -= 1;
                if (keys.s) moveZ += 1;
                if (keys.a) moveX -= 1;
                if (keys.d) moveX += 1;

                const isMoving = moveX !== 0 || moveZ !== 0;

                if (isMoving) {
                    const length = Math.sqrt(moveX * moveX + moveZ * moveZ);
                    const dirX = moveX / length, dirZ = moveZ / length;
                    
                    const s = Math.sin(cameraAngleX), c = Math.cos(cameraAngleX);
                    const worldDirX = dirX * c - dirZ * s, worldDirZ = dirX * s + dirZ * c;

                    const nextX = playerGroup.position.x + worldDirX * moveSpeed * delta;
                    const nextZ = playerGroup.position.z + worldDirZ * moveSpeed * delta;

                    let clampX = nextX;
                    let clampZ = nextZ;

                    let inMain = clampZ <= 19.5;
                    let inCorridor = clampZ > 19.5 && clampZ <= 40.5;
                    let inHallB = clampZ > 40.5;

                    if (playerGroup.position.z <= 19.5 && clampZ > 19.5 && (clampX < -4.5 || clampX > 4.5)) {
                        clampZ = 19.5; inMain = true; inCorridor = false;
                    }
                    if (playerGroup.position.z >= 40.5 && clampZ < 40.5 && (clampX < -4.5 || clampX > 4.5)) {
                        clampZ = 40.5; inHallB = true; inCorridor = false;
                    }

                    if (inMain) {
                        if (clampX < -19.5) clampX = -19.5;
                        if (clampX > 19.5) clampX = 19.5;
                        if (clampZ < -19.5) clampZ = -19.5;
                    } else if (inCorridor) {
                        if (clampX < -4.5) clampX = -4.5;
                        if (clampX > 4.5) clampX = 4.5;
                    } else if (inHallB) {
                        if (clampX < -29.5) clampX = -29.5;
                        if (clampX > 29.5) clampX = 29.5;
                        if (clampZ > 99.5) clampZ = 99.5;
                    }

                    playerGroup.position.x = clampX;
                    playerGroup.position.z = clampZ;

                    const targetAngle = Math.atan2(worldDirX, worldDirZ);
                    let diff = targetAngle - playerGroup.rotation.y;
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    playerGroup.rotation.y += diff * 12 * delta; 

                    playAnimation('walk'); 
                    
                    if (isFocused) {
                        closeInfoPanel();
                    }
                } else {
                    playAnimation('idle'); 
                }

                let targetCameraPos = new THREE.Vector3();
                let targetLookAt = new THREE.Vector3();

                if (isFocused) {
                    targetCameraPos.copy(focusCameraTarget);
                    targetLookAt.copy(focusLookAtTarget);
                } else if (isFirstPerson) {
                    targetCameraPos.copy(playerGroup.position).add(new THREE.Vector3(0, 2.5, 0)); 
                    
                    const lookDir = new THREE.Vector3(
                        -Math.sin(cameraAngleY) * Math.sin(cameraAngleX),
                        -Math.cos(cameraAngleY) + 0.5,
                        -Math.sin(cameraAngleY) * Math.cos(cameraAngleX)
                    ).normalize();
                    
                    targetLookAt.copy(targetCameraPos).add(lookDir);
                } else {
                    const offsetX = cameraDistance * Math.sin(cameraAngleY) * Math.sin(cameraAngleX);
                    const offsetY = cameraDistance * Math.cos(cameraAngleY);
                    const offsetZ = cameraDistance * Math.sin(cameraAngleY) * Math.cos(cameraAngleX);
                    targetCameraPos.copy(playerGroup.position).add(new THREE.Vector3(offsetX, offsetY, offsetZ));
                    targetLookAt.copy(playerGroup.position).add(new THREE.Vector3(0, 1.5, 0));
                }

                camera.position.lerp(targetCameraPos, 0.08);

                if (currentLookAt.length() === 0) currentLookAt.copy(targetLookAt); 
                currentLookAt.lerp(targetLookAt, 0.08);
                camera.lookAt(currentLookAt);
                
                const targetFOV = isFocused ? 45 : 75;
                if (Math.abs(camera.fov - targetFOV) > 0.1) {
                    camera.fov += (targetFOV - camera.fov) * 0.1;
                    camera.updateProjectionMatrix();
                }

                if (guideBot) {
                    const time = clock.getElapsedTime();
                    const botOffset = new THREE.Vector3(-1.5, 2.0 + Math.sin(time * 2) * 0.1, -1.0);
                    botOffset.applyAxisAngle(new THREE.Vector3(0, 1, 0), playerGroup.rotation.y);
                    const botTarget = playerGroup.position.clone().add(botOffset);
                    guideBot.position.lerp(botTarget, 0.05);
                }
            }

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(artworks);

            const holoUI = document.getElementById('hologram-ui');

            if (intersects.length > 0) {
                document.body.style.cursor = 'crosshair';
                
                if (hoveredArtwork !== intersects[0].object) {
                    if (hoveredArtwork) hoveredArtwork.userData.highlightMesh.material.emissiveIntensity = hoveredArtwork.userData.is3D ? 0.0 : 0.5;
                    
                    hoveredArtwork = intersects[0].object;
                    hoveredArtwork.userData.highlightMesh.material.emissiveIntensity = hoveredArtwork.userData.is3D ? 2.5 : 2.5; 
                }

                if (!isFocused && hoveredArtwork) {
                    const vector = hoveredArtwork.position.clone();
                    vector.y += hoveredArtwork.userData.is3D ? 1.5 : 1.0; 
                    vector.project(camera);

                    const x = (vector.x * .5 + .5) * window.innerWidth;
                    const y = (vector.y * -.5 + .5) * window.innerHeight;

                    holoUI.style.left = `${x}px`;
                    holoUI.style.top = `${y}px`;
                    holoUI.classList.remove('opacity-0');
                    document.getElementById('hologram-title').innerText = hoveredArtwork.userData.info.title;
                } else {
                    holoUI.classList.add('opacity-0');
                }

            } else {
                document.body.style.cursor = 'default';
                holoUI.classList.add('opacity-0'); 
                if (hoveredArtwork) {
                    hoveredArtwork.userData.highlightMesh.material.emissiveIntensity = hoveredArtwork.userData.is3D ? 0.0 : 0.5;
                    hoveredArtwork = null;
                }
            }

            if (mixer) mixer.update(delta);
            composer.render();
        };

        window.onload = init;
    </script>
</body>
</html>
