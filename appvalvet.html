    <style>
        ::-webkit-scrollbar { width: 6px; }

        .app-card {
            transition: transform 0.1s ease, box-shadow 0.1s ease, border-color 0.3s ease;
            transform-style: preserve-3d;
            opacity: 0;
            animation: fadeInUp 0.5s ease-out forwards;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px) translateZ(-50px); }
            to { opacity: 1; transform: translateY(0) translateZ(0); }
        }

        .scanline {
            position: fixed;
            top: 0; left: 0; right: 0; height: 10px;
            background: linear-gradient(to bottom, transparent, rgba(229, 142, 38, 0.2), transparent);
            animation: scan 6s linear infinite;
            pointer-events: none;
            z-index: 40;
        }
        @keyframes scan {
            0% { transform: translateY(-100vh); }
            100% { transform: translateY(200vh); }
        }

        @keyframes flowData {
            to { stroke-dashoffset: -60; }
        }
        
        .animate-data-flow-amber {
            stroke-dasharray: 10 40;
            animation: flowData 1.5s linear infinite;
            stroke: #e58e26;
        }

        body.matrix-mode { background: #000 !important; }

        body.matrix-mode .bg-cover, body.matrix-mode img, body.matrix-mode video { display: none !important; }

        body.matrix-mode h1, body.matrix-mode h2, body.matrix-mode h4, body.matrix-mode p, body.matrix-mode span, body.matrix-mode i {

            border-color: #10b981 !important;
            text-shadow: none !important;

        body.matrix-mode .animate-data-flow-amber { stroke: #10b981 !important; }

        body.matrix-mode [class*="section-bg-"] { background: transparent !important; border-color: #10b981 !important; }

    <script>
        // ================== BOOT SEQUENCE LOGIC ==================
        const bootLines = [
            "> UPPKOPPLING MOT N.E.X.U.S KÄRNMOTOR...",
            "> AUTENTISERAR: ARKITEKT JONAS BLOMQUIST...",
            "> ÅTKOMST BEVILJAD.",
            "> LADDAR MATRIX-PROTOKOLL OCH DNA-STRÄNGAR...",
            "> DEKRYPTERAR 60+ SYSTEMMODULER...",
            "> SYNKRONISERAR NÄTVERK...",
            "> VÄLKOMMEN TILLBAKA."
        ];
        
        let bootSynth;
        let lineIdx = 0;
        
        async function startBoot() {
            if(document.getElementById('boot-started')) return; 
            const bootScreen = document.getElementById('boot-screen');
            bootScreen.id = 'boot-started';
            document.getElementById('boot-prompt').style.display = 'none';
            
            await Tone.start();
            bootSynth = new Tone.PolySynth(Tone.Synth, {
                oscillator: { type: 'square' },
                envelope: { attack: 0.01, decay: 0.05, sustain: 0, release: 0.01 }
            }).toDestination();
            bootSynth.volume.value = -25;
            
            showNextLine();
        }
        
        function showNextLine() {
            if(lineIdx < bootLines.length) {
                const p = document.createElement('p');
                p.innerText = bootLines[lineIdx];
                document.getElementById('boot-text').appendChild(p);
                lineIdx++;
                if(bootSynth) bootSynth.triggerAttackRelease("C5", "32n");
                setTimeout(showNextLine, 300 + Math.random() * 500); 
            } else {
                if(bootSynth) bootSynth.triggerAttackRelease(["C3", "E3", "G3"], "2n");
                setTimeout(() => {
                    document.getElementById('boot-started').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('boot-started').remove();
                        renderApps(); // Rita upp valvet först när booten är klar
                    }, 1000);
                }, 1000);
            }
        }

        // ================== MATRIX MODE ==================
        let matrixMode = false;
        function toggleMatrixMode() {
            matrixMode = !matrixMode;
            if(matrixMode) {
                document.body.classList.add('matrix-mode');
                document.getElementById('matrix-btn-text').innerText = 'Stäng Matrix';
                if(bootSynth) bootSynth.triggerAttackRelease("A4", "16n");
            } else {
                document.body.classList.remove('matrix-mode');
                document.getElementById('matrix-btn-text').innerText = 'Matrix Mode';
                if(bootSynth) bootSynth.triggerAttackRelease("C4", "16n");
            }
            setTimeout(drawNexusLines, 100);
        }

        // ================== DATABASE ==================
        const appDatabase = [
            // NYA FRÅN PDF
            { title: "Bygg eller uppgradera (Världsbyggaren)", desc: "Jag har utvecklat \"Bygg eller uppgradera\", en strategisk Al-hubb för att generera och arkivera högupplösta koncept inom multimedia och mjukvara. Mitt arkitektoniska beslut att använda en tvåstegs förfiningslogik och integrera ett systemindex av 60+ tidigare appar skapar ett verktyg som levererar tekniskt polerade prompts med 8K-precision, optimerade för Gemini Pro.", mainCategory: "Verktyg & Prompts", subCategory: "Prompt Engineering", id: "SYS-BYGG1" },
            { title: "Bygg eller uppgradera (Hyper-Multimodal)", desc: "Jag har utvecklat \"Bygg eller uppgradera\", en strategisk Al-hubb och idé-vault för generering av multimedia och mjukvara med 8K-precision. Mitt arkitektoniska beslut att använda en Hyper-Multimodal Neural Engine med tvåstegs prompt-förfining och integration av ett 60-apps systemindex skapar ett verktyg som levererar tekniskt fulländade lösningar optimerade för Gemini Pro:s mest avancerade arkitektur.", mainCategory: "Verktyg & Prompts", subCategory: "Prompt Engineering", id: "SYS-BYGG2" },
            { title: "Character Consistency Lab Pro + Sago Appen", desc: "Jag har utvecklat Character Consistency Lab Pro, ett avancerat verktyg för att designa, fota och hantera visuellt konsekventa Al-karaktärer och deras garderober i en virtuell studio. Appens primära värde ligger i dess förmåga att generera och strukturera denna data som exporterbara \"Ensembler\", redo att agera fundament för nästa generations interaktiva Al-berättelser.", mainCategory: "Visuellt & Design", subCategory: "Bild & AI-Studio", id: "SYS-CHARL" },
            { title: "Data Neutralizer & Prompt Cleaner", desc: "Jag har utvecklat ett specialiserat system för batch-bearbetning som automatiserar städning och neutralisering av komplexa JSON-data. Mitt arkitektoniska beslut var att implementera en lokal logikmotor som identifierar och ersätter personliga referenser samt eliminerar teknisk redundans i textmassor. Genom att fokusera på integritet och prestanda har jag skapat ett verktyg som effektivt transformerar rådata till professionella, import-redo format för vidare Al-användning.", mainCategory: "Data & Arkitektur", subCategory: "Verktyg & Databehandling", id: "SYS-DATNE" },
            { title: "FaceMorph Pro 8K", desc: "Jag har utvecklat FaceMorph Pro 8K, en avancerad webbapplikation för högrealistiska och identitetsbevarande ansiktsbyten driven av Gemini- modeller. Mitt arkitektoniska beslut var att implementera en flerstegsprocess med förberedande porträttoptimering och en dual-image-logik som exakt separerar ansiktsstruktur från ytfärg och stil. Detta skapar ett kraftfullt men lättanvänt verktyg för att sömlöst transformera porträtt till fantasifulla karaktärer med full igenkänningsfaktor.", mainCategory: "Visuellt & Design", subCategory: "Bild & AI-Studio", id: "SYS-FMP8K" },
            { title: "Formfinnaren", desc: "Jag har utvecklat Formfinnaren, ett Al-drivet visualiseringsverktyg som hjälper hantverkare att se den optimala potentialen i råmaterial som sten och trä för att minimera materialsvinn. Mitt arkitektoniska beslut var att bygga en iterativ flerstegsarkitektur där Geminis spatiala analys av multivinkelbilder och exakta millimetermått kombineras med Imagens fotorealistiska renderingar, vilket skapar en exakt och kreativ bro mellan råämne och färdigt verk.", mainCategory: "Visuellt & Design", subCategory: "Bild & AI-Studio", id: "SYS-FORMF" },
            { title: "Gemini OS (Min Digitala Hubb)", desc: "Jag har arkitekterat Gemini OS som en central, enhetsoberoende plattform som konsoliderar över 35 specialiserade applikationer under ett och samma digitala tak. Genom att implementera en \"Single-File Architecture\" i React och integrera Firebase för molnsynkronisering, har jag skapat ett robust ekosystem som säkrar kognitiv struktur vid ADHD/bipolär sjukdom, möjliggör avancerat kreativt skapande och erbjuder en magisk digital värld för min dotter.", mainCategory: "System & Core Engines", subCategory: "Verktyg & Hubbar", id: "SYS-GEMOS" },
            { title: "Generationernas Arkitekt - Fas 1", desc: "Jag har utvecklat ett modulärt 4-appars system som bryter ner komplex bildgenerering i kontrollerade faser: Miljö, Motiv och Synergi. Mitt beslut var att skapa en central Hub som sammanfogar dessa dataflöden till hyperdetaljerade promptar, vilket ger användaren total arkitektonisk kontroll över varje pixel och emotionell koppling i bilden.", mainCategory: "Verktyg & Prompts", subCategory: "Prompt Engineering", id: "SYS-GENAR" },
            { title: "Genesis Exodus", desc: "Digital implementation och strukturering av spelet Genesis Exodus. Arkitekturen bakom att binda samman lore, kort och mekanik till ett fungerande digitalt väsen.", mainCategory: "Spel & Nöje", subCategory: "Genie Omega Universumet", id: "SYS-GENEX" },
            { title: "Historie-Detektiven Pro (Digitala Fotspår)", desc: "Jag har utvecklat ett digitalt forensiskt verktyg som metodiskt återskapar användarens personliga och digitala historia genom Al-driven djupsökning och en interaktiv feedback-loop. Mitt arkitektoniska beslut att kombinera realtidsdata med molnbaserad persistens förvandlar fragmenterade digitala fotspår till ett strukturerat, personligt arkiv med högt nostalgiskt och säkerhetsmässigt värde.", mainCategory: "Data & Arkitektur", subCategory: "Verktyg & Databehandling", id: "SYS-HISD1" },
            { title: "Historie-Detektiven Pro (Publika Arkiv)", desc: "Jag har utvecklat en Al-driven utredningsplattform som metodiskt återskapar användarens digitala historia genom djupsökning i publika arkiv. Mitt beslut var att kombinera molnbaserad persistens med ett interaktivt feedback- system, vilket förvandlar fragmenterade data till ett strukturerat personligt arkiv med fokus på nostalgi och informationssäkerhet.", mainCategory: "Data & Arkitektur", subCategory: "Verktyg & Databehandling", id: "SYS-HISD2" },

                if (appsInMain.length === 0) return;

                const section = document.createElement('div');
                section.className = `p-8 rounded-2xl bg-card/30 backdrop-blur-sm border border-border_subtle relative overflow-hidden mb-12 ${conf.bgClass}`;
                
                let html = `
                    <h2 class="text-3xl font-black uppercase tracking-widest text-slate-100 flex items-center gap-4 mb-8 relative z-10 drop-shadow-md" style="color: ${conf.hex}">
                        <div class="p-3 rounded-lg border shadow-inner" style="background-color: ${conf.hex}15; border-color: ${conf.hex}50">
                            <i data-lucide="${conf.icon}" class="w-8 h-8"></i>
                        </div>
                        ${mainCat}
                    </h2>
                    <div class="space-y-10 relative z-10">
                `;

                const subGroups = {};
                appsInMain.forEach(app => {
                    if(!subGroups[app.subCategory]) subGroups[app.subCategory] = [];
                    subGroups[app.subCategory].push(app);
                });

                Object.keys(subGroups).forEach(subCat => {
                    const subApps = subGroups[subCat];
                    html += `
                        <div class="sub-category-block">
                            <h4 class="text-sm font-bold text-slate-300 uppercase tracking-widest mb-5 border-b border-border_subtle pb-3 flex items-center gap-3 drop-shadow-md">
                                <i data-lucide="folder-tree" class="w-4 h-4 text-slate-500"></i>
                                ${subCat}
                                <span class="text-[10px] bg-main px-2 py-0.5 rounded border border-border_subtle text-slate-500 ml-2 font-mono">${subApps.length} APPS</span>
                            </h4>
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                    `;

                    subApps.forEach((app, i) => {
                        const wordCount = (app.desc || '').split(' ').length;
                        const complexity = Math.min(100, Math.floor((wordCount / 50) * 100) + 30);
                        
                        const bgImageHtml = app.image ? `
                            <div class="absolute inset-0 bg-cover bg-center z-0 transition-transform duration-700 group-hover:scale-105 opacity-70" style="background-image: url('${app.image}')"></div>
                            <div class="absolute inset-0 bg-gradient-to-t from-main/90 via-main/30 to-transparent z-0"></div>
                        ` : '';

                        html += `
                            <div class="app-card bg-main/40 backdrop-blur-sm border border-border_subtle hover:border-[${conf.hex}] rounded-xl p-5 cursor-pointer shadow-lg hover:shadow-[0_0_20px_${conf.hex}40] overflow-hidden group" 
                                 style="animation-delay: ${i * 0.05}s;"
                                 onmouseenter="tiltCard(event, this)"
                                 onmouseleave="resetTilt(this)"
                                 onclick="openModalFromID('${app.id}')">
                                
                                ${bgImageHtml}
                                
                                <div class="flex justify-between items-start mb-4 relative z-10">
                                    <div class="w-10 h-10 rounded border border-white/20 flex items-center justify-center shadow-lg bg-black/60 backdrop-blur-md" style="color: ${conf.hex}">
                                        <i data-lucide="${conf.icon}" class="w-5 h-5 drop-shadow-[0_0_8px_rgba(255,255,255,0.3)]"></i>
                                    </div>
                                    <span class="text-[9px] font-mono border rounded px-2 py-1 uppercase tracking-widest bg-black/60 backdrop-blur-md border-white/20 drop-shadow-md text-white shadow-lg">${app.id}</span>
                                </div>
                                
                                <div class="relative z-10 pt-8 mt-2">
                                    <h4 class="text-base font-black text-white mb-2 leading-tight drop-shadow-[0_2px_4px_rgba(0,0,0,1)]">${app.title}</h4>
                                    <p class="text-xs text-slate-200 line-clamp-2 drop-shadow-[0_2px_4px_rgba(0,0,0,1)] font-medium leading-relaxed">${app.desc}</p>
                                </div>
                                
                                <div class="mt-4 pt-3 border-t border-white/20 flex justify-between items-center relative z-10">
                                    <div class="w-full bg-black/50 backdrop-blur-md rounded-full h-1 mr-4 overflow-hidden border border-white/10 shadow-inner">
                                        <div class="h-full drop-shadow-[0_0_5px_rgba(255,255,255,0.5)]" style="width: ${complexity}%; background-color: ${conf.hex};"></div>
                                    </div>
                                    <span class="text-[8px] font-mono text-slate-300 uppercase drop-shadow-[0_1px_2px_rgba(0,0,0,1)] font-bold">SYS_LOAD</span>
                                </div>
                            </div>
                        `;
                    });

                    html += `</div></div>`;
                });

                html += `</div>`;
                section.innerHTML = html;
                container.appendChild(section);
            });

            lucide.createIcons();
            
            // Rita SVG trådar efter att korten ritats ut
            setTimeout(drawNexusLines, 100);
        }

        function drawNexusLines() {
            const container = document.getElementById('sections-container');
            const svg = document.getElementById('nexus-svg-layer');
            if(!svg || matrixMode) { svg.innerHTML = ''; return; } // Göm trådar i Matrix mode
            
            svg.innerHTML = '';
            const containerRect = container.getBoundingClientRect();
            const cards = Array.from(document.querySelectorAll('.app-card'));
            
            for(let i = 0; i < cards.length - 1; i++) {
                const rect1 = cards[i].getBoundingClientRect();
                const rect2 = cards[i+1].getBoundingClientRect();
                
                const x1 = (rect1.left - containerRect.left) + rect1.width / 2;
                const y1 = (rect1.top - containerRect.top) + rect1.height / 2;
                const x2 = (rect2.left - containerRect.left) + rect2.width / 2;
                const y2 = (rect2.top - containerRect.top) + rect2.height / 2;
                
                // Endast dra trådar om korten är någorlunda nära varandra (undviker kaos)
                if (Math.abs(y1 - y2) < 1200) {
                    const pathData = `M ${x1} ${y1} C ${x1} ${(y1+y2)/2}, ${x2} ${(y1+y2)/2}, ${x2} ${y2}`;
                    
                    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    path.setAttribute("d", pathData);
                    path.setAttribute("fill", "none");
                    path.setAttribute("stroke", "rgba(229, 142, 38, 0.15)");
                    path.setAttribute("stroke-width", "3");
                    
                    const pulse = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    pulse.setAttribute("d", pathData);
                    pulse.setAttribute("fill", "none");
                    pulse.setAttribute("stroke", "rgba(229, 142, 38, 0.6)");
                    pulse.setAttribute("stroke-width", "2");
                    pulse.setAttribute("class", "animate-data-flow-amber");
                    
                    svg.appendChild(path);
                    svg.appendChild(pulse);
                }
            }
        }
        
        window.addEventListener('resize', drawNexusLines);

        function exportDNA() {
            const dataStr = JSON.stringify(appDatabase, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            const exportFileDefaultName = 'blom_app_vault_dna.json';
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
        }

        function tiltCard(e, card) {
            if(matrixMode) return; // Inget tilt i Matrix Mode
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const tiltX = (y - rect.height / 2) / 10;
            const tiltY = (rect.width / 2 - x) / 10;
            card.style.transform = `perspective(1000px) rotateX(${tiltX}deg) rotateY(${tiltY}deg) scale3d(1.02, 1.02, 1.02)`;
        }
        function resetTilt(card) {
            if(matrixMode) return;
            card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
        }

        let currentModalText = "";
        
        function openModalFromID(appId) {
             const app = appDatabase.find(a => a.id === appId);
             if(app) openModal(app);
        }

        function openModal(app) {
            const conf = mainCategoriesConfig[app.mainCategory];
            document.getElementById('modal-id').textContent = app.id;
            document.getElementById('modal-category').textContent = `${app.mainCategory} // ${app.subCategory}`;
            document.getElementById('modal-category').style.color = conf.hex;
            
            document.getElementById('modal-icon').innerHTML = `<i data-lucide="${conf.icon}" class="w-6 h-6"></i>`;
            document.getElementById('modal-icon').style.color = conf.hex;

            const words = app.desc.split(' ').length;
            document.getElementById('read-time').innerText = `⏱ ${Math.max(1, Math.ceil(words / 150))} min read`;

            document.getElementById('modal-fulldesc').innerHTML = app.desc || '';
            currentModalText = app.desc || '';
            
            const modalBgImg = document.getElementById('modal-bg-img');
            const modalBgVideo = document.getElementById('modal-bg-video');

            if(app.video && !matrixMode) {
                modalBgVideo.src = app.video;
                modalBgVideo.classList.remove('hidden');
                modalBgImg.classList.add('hidden');
                modalBgImg.style.backgroundImage = 'none';
            } else if(app.image && !matrixMode) {
                modalBgVideo.src = '';
                modalBgVideo.classList.add('hidden');
                modalBgImg.style.backgroundImage = `url('${app.image}')`;
                modalBgImg.classList.remove('hidden');
            } else {
                modalBgImg.classList.add('hidden');
                modalBgImg.style.backgroundImage = 'none';
                modalBgVideo.src = '';
                modalBgVideo.classList.add('hidden');
            }
            
            const launchBtn = document.getElementById('modal-launch-btn');
            if(app.url) {
                launchBtn.href = app.url;
                launchBtn.classList.remove('hidden');
                launchBtn.classList.add('flex');
            } else {
                launchBtn.classList.add('hidden');
                launchBtn.classList.remove('flex');
            }

            const modal = document.getElementById('doc-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            document.body.style.overflow = 'hidden'; 
            const scrollContainer = document.querySelector('.custom-scrollbar');
            if(scrollContainer) scrollContainer.scrollTop = 0;
            
            lucide.createIcons();

            const titleEl = document.getElementById('modal-title');
            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*";
            let iterations = 0;
            const interval = setInterval(() => {
                titleEl.innerText = app.title.split("").map((l, idx) => {
                    if(idx < iterations) return app.title[idx];
                    return letters[Math.floor(Math.random() * letters.length)];
                }).join("");
                if(iterations >= app.title.length) clearInterval(interval);
                iterations += 1/3;
            }, 30);
        }

        function closeModal() {
            const modal = document.getElementById('doc-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = 'auto';
            document.getElementById('modal-bg-video').src = '';
        }

        function copyDoc() {
            navigator.clipboard.writeText(currentModalText);
            const btn = document.querySelector('button[title="Kopiera text"]');
            const orgHtml = btn.innerHTML;
            btn.innerHTML = `<i data-lucide="check" class="w-5 h-5 text-emerald-400"></i>`;
            lucide.createIcons();
            setTimeout(() => { btn.innerHTML = orgHtml; lucide.createIcons(); }, 2000);
        }
    </script>
</body>
</html>
