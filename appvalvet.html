            // ================== SYSTEM & CORE ENGINES ==================
            { title: "Interaktiv Karaktärsskapare", desc: "Jag har utvecklat en Interaktiv Karaktärsskapare, en avancerad 3D-prototyp optimerad för att efterlikna professionella spelgränssnitt som The Sims 4. Mitt arkitektoniska beslut var att migrera från enklare CSS-transformationer till en fullständig integration av Three.js, där jag implementerat en stabil geometri-logik baserad på cylindrar och sfärer för att garantera prestanda och kompatibilitet. Genom att separera systemets reaktiva Ul-tillstånd från den hårdvaruaccelererade WebGL-renderingens \"Physically Based Rendering\"-material, har jag skapat en sömlös och realistisk miljö för karaktärsanpassning i realtid med professionell studioljussättning.", mainCategory: "System & Core Engines", subCategory: "Kärnmotorer", id: "SYS-IKS" },
            { title: "Modern Dashboard-arkitektur", desc: "Jag har utvecklat en Modern Dashboard-arkitektur, en robust och skalbar React-plattform designad för administrativa system där driftsäkerhet och responsivitet står i centrum. Mitt arkitektoniska beslut som systemarkitekt var att implementera ett Single-File Pattern för att eliminera importfel och maximera portabiliteten, kombinerat med en Global Error Boundary som isolerar runtime-fel och garanterar att systemet förblir tillgängligt för användaren. Genom att använda en modulär komponentstruktur och utility-first-styling har jag skapat ett blixtsnabbt gränssnitt som sömlöst hanterar dynamisk navigering och komplex datavisualisering på alla enhetstyper.", mainCategory: "System & Core Engines", subCategory: "Kärnmotorer", id: "SYS-MDA" },
            { title: "FaceSwap Studio Pro", desc: "Jag har utvecklat FaceSwap Studio Pro, en neural applikation för fotorealistiska ansiktsbyten där källans ansiktsgeometri överförs och sömlöst ärver målbildens exakta textur.", mainCategory: "System & Core Engines", subCategory: "Kärnmotorer", id: "SYS-FSSPR", image: "https://i.imgur.com/PHx8NRF.jpeg" },
            { title: "VGP Core Engine (v26.0)", desc: "En högpresterande 8K-renderingsmotor och världsbyggare baserad på Three.js och GPGPU-fysik.", mainCategory: "System & Core Engines", subCategory: "Kärnmotorer", id: "SYS-VGPCE", image: "https://i.imgur.com/ENqOvTf.jpeg" },
            { title: "allt-i-ett-lösning (Skapa med Blom +)", desc: "Jag har utvecklat Skapa med Blom +, en kognitivt anpassad dashboard-arkitektur designad för att fungera som både en kreativ katalysator och en stabilisator för vardagen. Mitt arkitektoniska beslut som systemarkitekt var att bygga en \"allt-i-ett-hubb\" i React som integrerar stöd för ADHD och bipolär problematik genom att minimera sensorisk belastning med en mörk, futuristisk estetik (Slate-950). Genom att konsolidera Al-driven idégenerering, träningsloggar och kontextuella statusuppdateringar (t.ex. \"Lilja-vecka\") i en resilient enfils-applikation, har jag skapat ett gränssnitt som reducerar exekutiva hinder och möjliggör ett sömlöst flöde mellan livets måsten och kreativt skapande.", mainCategory: "System & Core Engines", subCategory: "Verktyg & Hubbar", id: "SYS-AIE" },

            { title: "Mediastudio (App Archive V1.0)", desc: "Mediastudio är ett molnbaserat digitalt arkiv utvecklat för strukturerad hantering och dokumentation av grafiska projekt, kodloggar och externa mediefiler. Systemet optimerar lagringsutrymmet genom integrerad Al-driven bildgenerering kombinerat med automatisk klientbaserad datakomprimering av visuell media. Plattformen säkerställer hög dataintegritet via en isolerad arbetsvy för asynkron redigering samt fullständigt stöd för export och import via lokala JSON-backuper.", mainCategory: "System & Core Engines", subCategory: "Verktyg & Hubbar", id: "SYS-MEDS" },
            { title: "JokeForge", desc: "JokeForge är en specialiserad webbapplikation för generering och systematisk organisering av högintensiv, mörk humor.", mainCategory: "System & Core Engines", subCategory: "Verktyg & Hubbar", id: "SYS-JOKEF", image: "https://i.imgur.com/NBvPbIT.jpeg" },
            { title: "Offertkalkylator Pro", desc: "Offertkalkylator Pro är en serverlös, Al-driven webbapplikation i en enda fil som låter företagare kalkylera avancerade projekt.", mainCategory: "System & Core Engines", subCategory: "Verktyg & Hubbar", id: "SYS-OFFPR", image: "https://i.imgur.com/Zc885y4.jpeg" },
            { title: "App-Inspiration & Skaparglädje", desc: "Jag har utvecklat \"Inspiratören\" som en central idé-hubb och portfolio-hanterare där jag sömlöst kan importera all min JSON-kod.", mainCategory: "System & Core Engines", subCategory: "Verktyg & Hubbar", id: "SYS-INSPR", image: "https://i.imgur.com/OBp5uYs.jpeg" },
            { title: "Arkitekt Hubb", desc: "Ett centralt valv och ekosystem för att säkra, organisera och dokumentera mitt digitala livsverk och min skaparresa.", mainCategory: "System & Core Engines", subCategory: "Verktyg & Hubbar", id: "SYS-ARKHB", image: "https://i.imgur.com/iI0vEY2.jpeg" },
            { title: "Atelier Gallery", desc: "Atelier Gallery är en digital kurator- och utställningsplattform som kombinerar Al-driven bildanalys med pixelperfekt beskärning.", mainCategory: "System & Core Engines", subCategory: "Verktyg & Hubbar", id: "SYS-ATELG", image: "https://i.imgur.com/d57LdvT.jpeg" },
            { title: "Bloms Magiska Pensel", desc: "Det här kortet fångar precis kärnan i ditt arbete: hur du gick från enkla bildändringar till att bygga en hel motor som låter en \"kliva in\" i fotot.", mainCategory: "System & Core Engines", subCategory: "Verktyg & Hubbar", id: "SYS-MAGPE", image: "https://i.imgur.com/Ye2aIHV.jpeg" },
            { title: "Gemini OS (Min Digitala Hubb)", desc: "Jag har arkitekterat Gemini OS som en central, enhetsoberoende plattform som konsoliderar över 35 specialiserade applikationer under ett och samma digitala tak.", mainCategory: "System & Core Engines", subCategory: "Verktyg & Hubbar", id: "SYS-GEMOS" }
        ];

        const mainCategoriesConfig = {
            "Genie Omega Ekosystem": { hex: "#a855f7", icon: "sparkles", bgClass: "section-bg-genie" },
            "Fortnite Battle TCG": { hex: "#ec4899", icon: "gamepad-2", bgClass: "section-bg-fortnite" },
            "Data & Arkitektur": { hex: "#3b82f6", icon: "network", bgClass: "section-bg-dna" },
            "Musik & Ljud": { hex: "#10b981", icon: "headphones", bgClass: "section-bg-musik" },
            "Visuellt & Design": { hex: "#f59e0b", icon: "palette", bgClass: "section-bg-visuell" },
            "Litteratur & Äventyr": { hex: "#06b6d4", icon: "book-open", bgClass: "section-bg-litteratur" },
            "Verktyg & Prompts": { hex: "#9ca3af", icon: "terminal-square", bgClass: "section-bg-prompts" },
            "Spel & Nöje": { hex: "#ef4444", icon: "gamepad-2", bgClass: "section-bg-spel" },
            "System & Core Engines": { hex: "#64748b", icon: "cpu", bgClass: "section-bg-core" }
        };

        window.addEventListener('DOMContentLoaded', () => {
            renderApps();
            lucide.createIcons();
        });

        function filterApps() {
            renderApps();
        }

        function renderApps() {
            const container = document.getElementById('sections-container');
            container.innerHTML = '';
            const query = document.getElementById('app-search').value.toLowerCase();

            Object.keys(mainCategoriesConfig).forEach(mainCat => {
                const conf = mainCategoriesConfig[mainCat];
                
                const appsInMain = appDatabase.filter(app => 
                    app.mainCategory === mainCat && 
                    (app.title.toLowerCase().includes(query) || (app.desc || '').toLowerCase().includes(query) || (app.subCategory || '').toLowerCase().includes(query))
                );
                
                if (appsInMain.length === 0) return;

                const section = document.createElement('div');
                section.className = `p-8 rounded-2xl bg-card/30 backdrop-blur-sm border border-border_subtle relative overflow-hidden ${conf.bgClass}`;
                
                let html = `
                    <h2 class="text-3xl font-black uppercase tracking-widest text-slate-100 flex items-center gap-4 mb-8 relative z-10" style="color: ${conf.hex}">
                        <div class="p-3 rounded-lg border" style="background-color: ${conf.hex}15; border-color: ${conf.hex}50">
                            <i data-lucide="${conf.icon}" class="w-8 h-8"></i>
                        </div>
                        ${mainCat}
                    </h2>
                    <div class="space-y-10 relative z-10">
                `;

                const subGroups = {};
                appsInMain.forEach(app => {
                    if(!subGroups[app.subCategory]) subGroups[app.subCategory] = [];
                    subGroups[app.subCategory].push(app);
                });

                Object.keys(subGroups).forEach(subCat => {
                    const subApps = subGroups[subCat];
                    
                    html += `
                        <div class="sub-category-block">
                            <h4 class="text-sm font-bold text-slate-300 uppercase tracking-widest mb-5 border-b border-border_subtle pb-3 flex items-center gap-3">
                                <i data-lucide="folder-tree" class="w-4 h-4 text-slate-500"></i>
                                ${subCat}
                                <span class="text-[10px] bg-main px-2 py-0.5 rounded text-slate-500 ml-2 font-mono">${subApps.length} APPS</span>
                            </h4>
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                    `;

                    subApps.forEach((app, i) => {
                        const wordCount = (app.desc || '').split(' ').length;
                        const complexity = Math.min(100, Math.floor((wordCount / 50) * 100) + 30);
                        
                        html += `
                            <div class="app-card bg-main/90 backdrop-blur-md border border-border_subtle hover:border-[${conf.hex}] rounded-xl p-5 cursor-pointer shadow-lg hover:shadow-[0_0_20px_${conf.hex}40]" 
                                 style="animation-delay: ${i * 0.05}s;"
                                 onmouseenter="tiltCard(event, this)"
                                 onmouseleave="resetTilt(this)"
                                 onclick="openModalFromID('${app.id}')">
                                
                                <div class="flex justify-between items-start mb-4">
                                    <div class="w-10 h-10 rounded border border-border_subtle flex items-center justify-center shadow-inner" style="background-color: ${conf.hex}20; color: ${conf.hex}">
                                        <i data-lucide="${conf.icon}" class="w-5 h-5"></i>
                                    </div>
                                    <span class="text-[9px] font-mono border rounded px-2 py-1 uppercase tracking-widest" style="border-color: ${conf.hex}50; color: ${conf.hex}">${app.id}</span>
                                </div>
                                <h4 class="text-sm font-bold text-white mb-2 leading-tight">${app.title}</h4>
                                <p class="text-xs text-slate-400 line-clamp-2">${app.desc}</p>
                                
                                <div class="mt-4 pt-3 border-t border-border_subtle/50 flex justify-between items-center">
                                    <div class="w-full bg-main rounded-full h-1 mr-4 overflow-hidden border border-border_subtle">
                                        <div class="h-full" style="width: ${complexity}%; background-color: ${conf.hex}; box-shadow: 0 0 5px ${conf.hex}"></div>
                                    </div>
                                    <span class="text-[8px] font-mono text-slate-500 uppercase">SYS_LOAD</span>
                                </div>
                            </div>
                        `;
                    });

                    html += `</div></div>`;
                });

                html += `</div>`;
                section.innerHTML = html;
                container.appendChild(section);
            });

            lucide.createIcons();
        }

        function tiltCard(e, card) {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const tiltX = (y - centerY) / 10;
            const tiltY = (centerX - x) / 10;
            card.style.transform = `perspective(1000px) rotateX(${tiltX}deg) rotateY(${tiltY}deg) scale3d(1.02, 1.02, 1.02)`;
        }
        function resetTilt(card) {
            card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
        }

        let currentModalText = "";
        
        function openModalFromID(appId) {
             const app = appDatabase.find(a => a.id === appId);
             if(app) openModal(app);
        }

        function openModal(app) {
            if(!app) return;
            const conf = mainCategoriesConfig[app.mainCategory] || { hex: '#e58e26', icon: 'cpu' };
            
            document.getElementById('modal-id').textContent = app.id || 'SYS-UNK';
            document.getElementById('modal-category').textContent = `${app.mainCategory} // ${app.subCategory}`;
            document.getElementById('modal-category').style.color = conf.hex;
            
            document.getElementById('modal-icon').innerHTML = `<i data-lucide="${conf.icon}" class="w-6 h-6"></i>`;
            document.getElementById('modal-icon').style.color = conf.hex;
            document.getElementById('modal-icon').style.borderColor = `${conf.hex}50`;
            document.getElementById('modal-icon').style.backgroundColor = `${conf.hex}10`;

            const words = (app.desc || '').split(' ').length;
            document.getElementById('read-time').innerText = `⏱ ${Math.max(1, Math.ceil(words / 150))} min read`;

            document.getElementById('modal-fulldesc').innerHTML = app.desc || '';
            currentModalText = app.desc || '';
            
            const bannerContainer = document.getElementById('modal-banner-container');
            const bannerImg = document.getElementById('modal-banner-img');
            const bannerVideo = document.getElementById('modal-banner-video');
            const assetIconWrapper = document.getElementById('asset-icon-wrapper');
            const assetLabel = document.getElementById('asset-label');

            if(app.video) {
                bannerVideo.src = app.video;
                bannerVideo.classList.remove('hidden');
                bannerImg.classList.add('hidden');
                bannerImg.style.backgroundImage = 'none';
                bannerContainer.classList.remove('hidden');
                assetIconWrapper.innerHTML = `<i data-lucide="film" class="w-3 h-3 text-accent"></i>`;
                assetLabel.innerText = "Video Asset";
            } else if(app.image) {
                bannerVideo.src = '';
                bannerVideo.classList.add('hidden');
                bannerImg.style.backgroundImage = `url('${app.image}')`;
                bannerImg.classList.remove('hidden');
                bannerContainer.classList.remove('hidden');
                assetIconWrapper.innerHTML = `<i data-lucide="image" class="w-3 h-3 text-accent"></i>`;
                assetLabel.innerText = "Visual Asset";
            } else {
                bannerContainer.classList.add('hidden');
                bannerImg.style.backgroundImage = 'none';
                bannerVideo.src = '';
            }
            
            const launchBtn = document.getElementById('modal-launch-btn');
            if(app.url) {
                launchBtn.href = app.url;
                launchBtn.classList.remove('hidden');
                launchBtn.classList.add('flex');
            } else {
                launchBtn.classList.add('hidden');
                launchBtn.classList.remove('flex');
            }

            const modal = document.getElementById('doc-modal');
            modal.style.display = 'block'; 
            
            document.body.style.overflow = 'hidden'; 
            const scrollContainer = document.querySelector('.custom-scrollbar');
            if(scrollContainer) scrollContainer.scrollTop = 0;
            
            lucide.createIcons();

            const titleEl = document.getElementById('modal-title');
            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*";
            let iterations = 0;
            const interval = setInterval(() => {
                titleEl.innerText = (app.title || '').split("").map((l, idx) => {
                    if(idx < iterations) return (app.title || '')[idx];
                    return letters[Math.floor(Math.random() * letters.length)];
                }).join("");
                if(iterations >= (app.title || '').length) clearInterval(interval);
                iterations += 1/3;
            }, 30);
        }

        function closeModal() {
            const modal = document.getElementById('doc-modal');
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
            document.getElementById('modal-banner-video').src = '';
        }

        function copyDoc() {
            const fallbackCopyTextToClipboard = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                } catch (err) {
                    console.error('Kunde inte kopiera texten', err);
                }
                document.body.removeChild(textArea);
            };

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(currentModalText).catch(() => fallbackCopyTextToClipboard(currentModalText));
            } else {
                fallbackCopyTextToClipboard(currentModalText);
            }

            const btn = document.querySelector('button[title="Kopiera text"]');
            const orgHtml = btn.innerHTML;
            btn.innerHTML = `<i data-lucide="check" class="w-5 h-5 text-emerald-400"></i>`;
            lucide.createIcons();
            setTimeout(() => { btn.innerHTML = orgHtml; lucide.createIcons(); }, 2000);
        }
    </script>
</body>
</html>
