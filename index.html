<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>N.E.X.U.S Node Map</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    body { margin: 0; overflow: hidden; background-color: black; color: white; user-select: none; }
    
    /* Göm scrollbars men behåll scroll-funktion */
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
    
    .bg-radial-gradient {
      background-image: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.5) 50%, black 100%);
    }

    @keyframes spaceSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    @keyframes flowData {
      to { stroke-dashoffset: -60; }
    }
    
    .animate-data-flow-amber {
      stroke-dasharray: 10 40;
      animation: flowData 1.5s linear infinite;
      stroke: #f59e0b;
    }
    
    .animate-data-flow-emerald {
      stroke-dasharray: 10 40;
      animation: flowData 1.5s linear infinite;
      stroke: #10b981;
    }

    .modal-fade-in {
      animation: modalFadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes modalFadeIn {
      from { opacity: 0; transform: scale(0.95) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Sömlös roterande rymdbakgrund -->
  <div class="fixed inset-0 z-0 pointer-events-none">
    <div class="w-[300vw] h-[300vh] absolute -top-[100vh] -left-[100vw] opacity-70"
         style="background-image: url('https://i.imgur.com/03qVtdg.jpeg'); background-size: cover; background-position: center; animation: spaceSpin 150s linear infinite;">
    </div>
    <div class="absolute inset-0 bg-radial-gradient pointer-events-none"></div>
  </div>

  <!-- Huvudkarta (Panoreringsbar) -->
  <main id="container" class="h-screen w-full overflow-auto relative z-10 cursor-grab">
    <div class="w-[3000px] h-[3000px] relative flex items-center justify-center" id="map-area">
      
      <!-- SVG Linjer ritas här -->
      <svg class="absolute inset-0 w-full h-full pointer-events-none overflow-visible z-0" id="svg-layer"></svg>
      
      <!-- Noder ritas här via JS -->
    </div>
  </main>

  <!-- Modal för bilder -->
  <div id="modal" class="fixed inset-0 z-50 items-center justify-center p-4 md:p-8 hidden flex">
    <div class="absolute inset-0 bg-black/80 backdrop-blur-md transition-opacity" onclick="closeModal()"></div>
    
    <div class="relative inline-flex flex-col items-center justify-center max-w-full max-h-[90vh] modal-fade-in">
      <img id="modal-img" src="" class="max-w-full max-h-[90vh] object-contain rounded-2xl shadow-[0_0_100px_rgba(0,0,0,0.9)] pointer-events-auto" />
      <button onclick="closeModal()" class="absolute top-4 right-4 md:top-6 md:right-6 p-2 bg-black/50 hover:bg-neutral-800 border border-neutral-700 hover:border-white rounded-full text-neutral-400 hover:text-white transition-all backdrop-blur-xl z-50">
        <i data-lucide="x"></i>
      </button>
    </div>
  </div>

  <script>
    // --- DATABAS ÖVER KARTAN ---
    const mapNodes = [
      // Core Node
      { id: 'core', type: 'core', category: 'core', x: 0, y: 0, title: 'Jonas Blomquist', buttonImageUrl: 'https://i.imgur.com/e15bk2d.png', modal: { imageUrl: 'https://i.imgur.com/jBnpApX.jpeg' } },
      
      // TIGHTARE Zick-Zack layout för DNA
      { id: 'dna_1', type: 'info', category: 'dna', x: 150, y: -90, title: 'DNA-Arkivarien', buttonImageUrl: 'https://i.imgur.com/PFAdjgu.png', modal: { imageUrl: 'https://i.imgur.com/Ne2QW0P.jpeg' } },
      { id: 'dna_2', type: 'info', category: 'dna', x: 260, y: 70, title: 'Fragmenteraren', buttonImageUrl: 'https://i.imgur.com/ca2F98e.png', modal: { imageUrl: 'https://i.imgur.com/WbiHLes.png' } },
      { id: 'dna_3', type: 'info', category: 'dna', x: 370, y: -100, title: 'Analysatorn', buttonImageUrl: 'https://i.imgur.com/aR5GMF8.png', modal: { imageUrl: 'https://i.imgur.com/ChpOXSG.png' } },
      { id: 'dna_link', type: 'link', category: 'dna', x: 480, y: 50, title: 'Öppna App-Valv', url: 'appvalvet.html', buttonImageUrl: 'https://i.imgur.com/6CFcYkI.png' },
      
      // TIGHTARE Zick-Zack layout för Prompt
      { id: 'prompt_1', type: 'info', category: 'prompt', x: -150, y: -90, title: 'Prompt Scout Flow', buttonImageUrl: 'https://i.imgur.com/zJhIYWA.png', modal: { imageUrl: 'https://i.imgur.com/oMUYiaZ.png' } },
      { id: 'prompt_2', type: 'info', category: 'prompt', x: -260, y: 70, title: 'Ad Scout Flow', buttonImageUrl: 'https://i.imgur.com/akeUclH.png', modal: { imageUrl: 'https://i.imgur.com/zf6dqoA.png' } },
      { id: 'prompt_3', type: 'info', category: 'prompt', x: -370, y: -100, title: 'Prompt Scout Motion', buttonImageUrl: 'https://i.imgur.com/X3hHys6.png', modal: { imageUrl: 'https://i.imgur.com/zf6dqoA.png' } },
      { id: 'prompt_link', type: 'link', category: 'prompt', x: -480, y: 50, title: 'Öppna Kreationer', url: 'promptvalvet.html', buttonImageUrl: 'https://i.imgur.com/QffWYdp.png' }
    ];

    const mapEdges = [
      { from: 'core', to: 'dna_1', branch: 'dna' },
      { from: 'dna_1', to: 'dna_2', branch: 'dna' },
      { from: 'dna_2', to: 'dna_3', branch: 'dna' },
      { from: 'dna_3', to: 'dna_link', branch: 'dna' },
      { from: 'core', to: 'prompt_1', branch: 'prompt' },
      { from: 'prompt_1', to: 'prompt_2', branch: 'prompt' },
      { from: 'prompt_2', to: 'prompt_3', branch: 'prompt' },
      { from: 'prompt_3', to: 'prompt_link', branch: 'prompt' }
    ];

    // --- DOM ELEMENT ---
    const container = document.getElementById('container');
    const mapArea = document.getElementById('map-area');
    const svgLayer = document.getElementById('svg-layer');
    const modal = document.getElementById('modal');
    const modalImg = document.getElementById('modal-img');

    // --- INITIERING OCH RITNING AV KARTAN ---
    window.onload = () => {
      // Centrera kartan på skärmen
      container.scrollLeft = (container.scrollWidth - container.clientWidth) / 2;
      container.scrollTop = (container.scrollHeight - container.clientHeight) / 2;
      
      renderEdges();
      renderNodes();
      lucide.createIcons();
    };

    function renderEdges() {
      let svgHTML = '<g transform="translate(1500, 1500)">'; // Centrum
      
      mapEdges.forEach(edge => {
        const from = mapNodes.find(n => n.id === edge.from);
        const to = mapNodes.find(n => n.id === edge.to);
        
        if (from && to) {
          const midX = (from.x + to.x) / 2;
          const path = `M ${from.x} ${from.y} C ${midX} ${from.y}, ${midX} ${to.y}, ${to.x} ${to.y}`;
          const pulseClass = edge.branch === 'dna' ? 'animate-data-flow-amber' : 'animate-data-flow-emerald';
          
          svgHTML += `
            <g>
              <path d="${path}" fill="none" stroke="#1a1a1a" stroke-width="4" />
              <path d="${path}" fill="none" stroke-width="2" class="${pulseClass} opacity-80" />
            </g>
          `;
        }
      });
      
      svgHTML += '</g>';
      svgLayer.innerHTML = svgHTML;
    }

    function renderNodes() {
      mapNodes.forEach(node => {
        const btn = document.createElement('button');
        const isCore = node.type === 'core';
        
        btn.className = `absolute transition-all duration-500 hover:scale-110 flex items-center justify-center group outline-none ${isCore ? 'w-40 h-40 z-30' : 'w-40 h-16 z-20'}`;
        btn.style.left = `calc(50% + ${node.x}px)`;
        btn.style.top = `calc(50% + ${node.y}px)`;
        btn.style.transform = 'translate(-50%, -50%)';
        
        let pulseHTML = '';
        if (isCore) {
          pulseHTML = `<div class="absolute inset-0 bg-[#e58e26] rounded-full blur-2xl opacity-30 group-hover:opacity-60 transition-opacity duration-500 animate-[pulse_4s_ease-in-out_infinite] pointer-events-none"></div>`;
        } else {
          const pulseColor = node.category === 'dna' ? 'bg-amber-500' : 'bg-emerald-500';
          const pulseAnim = node.category === 'dna' ? 'animate-[pulse_4s_ease-in-out_infinite]' : 'animate-[pulse_3s_ease-in-out_infinite]';
          pulseHTML = `<div class="absolute inset-2 blur-xl opacity-40 group-hover:opacity-80 transition-opacity duration-500 pointer-events-none rounded-full ${pulseColor} ${pulseAnim}"></div>`;
        }

        const imgShadow = isCore ? 'drop-shadow-[0_0_25px_rgba(229,142,38,0.3)] group-hover:drop-shadow-[0_0_35px_rgba(229,142,38,0.6)]' : 'drop-shadow-[0_0_15px_rgba(0,0,0,0.8)]';

        btn.innerHTML = `
          ${pulseHTML}
          <img src="${node.buttonImageUrl}" alt="${node.title}" draggable="false" class="w-full h-full object-contain transition-transform duration-500 group-hover:rotate-2 relative z-10 ${imgShadow}">
        `;

        // Förhindra att drag-logiken triggas när vi klickar på en nod
        btn.addEventListener('mousedown', (e) => e.stopPropagation());
        
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          if (isDragging) return; // Klicka inte om vi håller på att panorera
          
          if (node.url) {
            window.location.href = node.url;
          } else if (node.modal) {
            openModal(node.modal.imageUrl);
          }
        });

        mapArea.appendChild(btn);
      });
    }

    // --- PANORERINGS-LOGIK (Drag & Drop) ---
    let isDragging = false;
    let dragStart = { x: 0, y: 0 };
    let scrollStart = { left: 0, top: 0 };

    container.addEventListener('mousedown', (e) => {
      isDragging = true;
      container.classList.remove('cursor-grab');
      container.classList.add('cursor-grabbing');
      dragStart = { x: e.pageX - container.offsetLeft, y: e.pageY - container.offsetTop };
      scrollStart = { left: container.scrollLeft, top: container.scrollTop };
    });

    container.addEventListener('mouseleave', () => {
      isDragging = false;
      container.classList.add('cursor-grab');
      container.classList.remove('cursor-grabbing');
    });

    container.addEventListener('mouseup', () => {
      isDragging = false;
      container.classList.add('cursor-grab');
      container.classList.remove('cursor-grabbing');
    });

    container.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      e.preventDefault();
      const x = e.pageX - container.offsetLeft;
      const y = e.pageY - container.offsetTop;
      const walkX = (x - dragStart.x) * 1.5; // Scroll-hastighet X
      const walkY = (y - dragStart.y) * 1.5; // Scroll-hastighet Y
      
      container.scrollLeft = scrollStart.left - walkX;
      container.scrollTop = scrollStart.top - walkY;
    });

    // --- MODAL LOGIK ---
    function openModal(imgUrl) {
      modalImg.src = imgUrl;
      modal.classList.remove('hidden');
    }

    function closeModal() {
      modal.classList.add('hidden');
      modalImg.src = '';
    }

  </script>
</body>
</html>
